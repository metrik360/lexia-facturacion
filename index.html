        // Vista de Cuentas por Cobrar - Replica el reporte "Cuentas por cobrar general por cliente" de Siigo
        function renderVistaCuentasPorCobrar() {
            // Usar TODAS las facturas (no solo las procesadas con balance > 0)
            // para poder calcular también los saldos a favor
            const hoy = new Date();

            // Agrupar facturas por cliente con cálculo de aging basado en due_date
            const cuentasPorCliente = {};

            facturas.forEach(f => {
                const nit = f.customer?.identification || 'N/A';
                const clienteInfo = clientesMap[nit] || { nombre: nit };
                const balance = f.balance || 0;

                // Obtener due_date del payment (fecha de vencimiento)
                // Si no hay payments, usar la fecha de factura + 30 días como default
                let dueDate = null;
                if (f.payments && f.payments.length > 0 && f.payments[0].due_date) {
                    dueDate = new Date(f.payments[0].due_date);
                } else if (f.date) {
                    dueDate = new Date(f.date);
                    dueDate.setDate(dueDate.getDate() + 30);
                }

                if (!cuentasPorCliente[nit]) {
                    cuentasPorCliente[nit] = {
                        nit: nit,
                        nombre: clienteInfo.nombre,
                        vencido1a30: 0,
                        vencido31a60: 0,
                        vencido61a90: 0,
                        vencidoMas91: 0,
                        saldoPorVencer: 0,
                        saldoAFavor: 0,
                        totalCartera: 0
                    };
                }

                // Si el balance es negativo, es saldo a favor
                if (balance < 0) {
                    cuentasPorCliente[nit].saldoAFavor += Math.abs(balance);
                } else if (balance > 0 && dueDate) {
                    // Calcular días de vencimiento
                    const diasVencido = Math.floor((hoy - dueDate) / (1000 * 60 * 60 * 24));

                    if (diasVencido < 0) {
                        // Aún no vence
                        cuentasPorCliente[nit].saldoPorVencer += balance;
                    } else if (diasVencido <= 30) {
                        cuentasPorCliente[nit].vencido1a30 += balance;
                    } else if (diasVencido <= 60) {
                        cuentasPorCliente[nit].vencido31a60 += balance;
                    } else if (diasVencido <= 90) {
                        cuentasPorCliente[nit].vencido61a90 += balance;
                    } else {
                        cuentasPorCliente[nit].vencidoMas91 += balance;
                    }
                }
            });

            // También procesar notas crédito como saldo a favor
            notasCredito.forEach(nc => {
                const nit = nc.customer?.identification || 'N/A';
                const clienteInfo = clientesMap[nit] || { nombre: nit };
                const balance = nc.balance || 0;

                if (balance > 0) {
                    if (!cuentasPorCliente[nit]) {
                        cuentasPorCliente[nit] = {
                            nit: nit,
                            nombre: clienteInfo.nombre,
                            vencido1a30: 0,
                            vencido31a60: 0,
                            vencido61a90: 0,
                            vencidoMas91: 0,
                            saldoPorVencer: 0,
                            saldoAFavor: 0,
                            totalCartera: 0
                        };
                    }
                    cuentasPorCliente[nit].saldoAFavor += balance;
                }
            });

            // Calcular total cartera para cada cliente
            Object.values(cuentasPorCliente).forEach(c => {
                const totalDebito = c.vencido1a30 + c.vencido31a60 + c.vencido61a90 + c.vencidoMas91 + c.saldoPorVencer;
                c.totalCartera = totalDebito - c.saldoAFavor;
            });

            // Convertir a array y ordenar por total cartera descendente
            let clientesArray = Object.values(cuentasPorCliente)
                .filter(c => c.totalCartera !== 0 || c.saldoAFavor > 0)
                .sort((a, b) => b.totalCartera - a.totalCartera);

            // Aplicar filtros si están activos
            if (filtros.cliente) {
                clientesArray = clientesArray.filter(c => c.nit === filtros.cliente);
            }

            // Calcular totales
            const totales = clientesArray.reduce((acc, c) => ({
                vencido1a30: acc.vencido1a30 + c.vencido1a30,
                vencido31a60: acc.vencido31a60 + c.vencido31a60,
                vencido61a90: acc.vencido61a90 + c.vencido61a90,
                vencidoMas91: acc.vencidoMas91 + c.vencidoMas91,
                saldoPorVencer: acc.saldoPorVencer + c.saldoPorVencer,
                saldoAFavor: acc.saldoAFavor + c.saldoAFavor,
                totalCartera: acc.totalCartera + c.totalCartera
            }), {
                vencido1a30: 0,
                vencido31a60: 0,
                vencido61a90: 0,
                vencidoMas91: 0,
                saldoPorVencer: 0,
                saldoAFavor: 0,
                totalCartera: 0
            });

            // Función para formatear valores en la tabla
            const formatVal = (val) => {
                if (val === 0) return '<span style="color: var(--gris-medio);">0</span>';
                return formatNumber(Math.round(val * 100) / 100);
            };

            // Generar filas de la tabla con onclick
            const filasHTML = clientesArray.map(c => `
                <tr onclick="seleccionarClienteCxC('${c.nit}', '${c.nombre.replace(/'/g, "\\'")}')" data-nit="${c.nit}">
                    <td>${c.nit}</td>
                    <td>${c.nombre}</td>
                    <td>${formatVal(c.vencido1a30)}</td>
                    <td class="${c.vencido31a60 > 0 ? 'cxc-warning' : ''}">${formatVal(c.vencido31a60)}</td>
                    <td class="${c.vencido61a90 > 0 ? 'cxc-warning' : ''}">${formatVal(c.vencido61a90)}</td>
                    <td class="${c.vencidoMas91 > 0 ? 'cxc-danger' : ''}">${formatVal(c.vencidoMas91)}</td>
                    <td>${formatVal(c.saldoPorVencer)}</td>
                    <td class="${c.saldoAFavor > 0 ? 'cxc-saldo-favor' : ''}">${formatVal(c.saldoAFavor)}</td>
                    <td class="${c.totalCartera < 0 ? 'cxc-total-cartera-negative' : 'cxc-total-cartera-positive'}">${formatVal(c.totalCartera)}</td>
                </tr>
            `).join('');

            return `
                <!-- Resumen de Cuentas por Cobrar -->
                <div class="cxc-summary-cards">
                    <div class="cxc-summary-card">
                        <div class="cxc-summary-card-label">Total Cartera</div>
                        <div class="cxc-summary-card-value ${totales.totalCartera < 0 ? 'negative' : ''}">${formatCurrency(totales.totalCartera)}</div>
                    </div>
                    <div class="cxc-summary-card">
                        <div class="cxc-summary-card-label">Total Vencido</div>
                        <div class="cxc-summary-card-value">${formatCurrency(totales.vencido1a30 + totales.vencido31a60 + totales.vencido61a90 + totales.vencidoMas91)}</div>
                    </div>
                    <div class="cxc-summary-card">
                        <div class="cxc-summary-card-label">Por Vencer</div>
                        <div class="cxc-summary-card-value">${formatCurrency(totales.saldoPorVencer)}</div>
                    </div>
                    <div class="cxc-summary-card">
                        <div class="cxc-summary-card-label">Saldo a Favor</div>
                        <div class="cxc-summary-card-value negative">${formatCurrency(totales.saldoAFavor)}</div>
                    </div>
                </div>

                <!-- Tabla de Cuentas por Cobrar -->
                <div class="cxc-container">
                    <div class="cxc-header">
                        <div>
                            <div class="cxc-title">Cuentas por Cobrar General por Cliente</div>
                            <div class="cxc-subtitle">${clientesArray.length} clientes con saldo</div>
                        </div>
                        <div class="cxc-subtitle">Procesado: ${new Date().toLocaleDateString('es-CO', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>
                    </div>

                    <div class="cxc-table-wrapper">
                        <table class="cxc-table">
                            <thead>
                                <tr>
                                    <th>Identificación</th>
                                    <th>Cliente</th>
                                    <th>Vencido 1 a 30</th>
                                    <th>Vencido 31 a 60</th>
                                    <th>Vencido 61 a 90</th>
                                    <th>Vencido más de 91</th>
                                    <th>Saldo por vencer</th>
                                    <th>Saldo a favor</th>
                                    <th>Total cartera</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${filasHTML}
                                <tr class="total-row">
                                    <td colspan="2"><strong>Total general</strong></td>
                                    <td>${formatNumber(Math.round(totales.vencido1a30 * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.vencido31a60 * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.vencido61a90 * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.vencidoMas91 * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.saldoPorVencer * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.saldoAFavor * 100) / 100)}</td>
                                    <td>${formatNumber(Math.round(totales.totalCartera * 100) / 100)}</td>
                                </tr>

                        </table>
                    </div>

                    <div class="cxc-info">
                        Haga clic en un cliente para ver el detalle de sus documentos.
                    </div>

                <!-- Detalle de documentos del cliente seleccionado -->

                <!-- Powered by Métrik -->
                <div class="powered-by-footer">
                    <span>Powered by</span>
                    <img src="https://i.ibb.co/sdb3Bpq5/M-trik-logo-iso.png" alt="Métrik" class="metrik-logo">
                </div>
            `;
        }

        // Estado para el filtro de documentos saldados
        let cxcOcultarSaldados = true;
        let cxcClienteSeleccionado = null;

        // Función para seleccionar cliente y mostrar sus documentos
        function seleccionarClienteCxC(nit, nombre) {
            cxcClienteSeleccionado = { nit, nombre };

            // Marcar fila como seleccionada
            document.querySelectorAll('.cxc-table tbody tr').forEach(tr => {
                tr.classList.remove('selected');
                if (tr.dataset.nit === nit) {
                    tr.classList.add('selected');
                }
            });

            renderDetalleCxC();
        }

        // Función para renderizar el detalle de documentos
        function renderDetalleCxC() {
            if (!cxcClienteSeleccionado) return;

            const { nit, nombre } = cxcClienteSeleccionado;
            const container = document.getElementById('cxcDetalleContainer');
            if (!container) return;

            // Construir índice de notas crédito por factura vinculada
            const ncPorFactura = {};
            notasCredito.forEach(nc => {
                if (nc.customer?.identification === nit && nc.invoice?.name) {
                    const facturaKey = nc.invoice.name;
                    if (!ncPorFactura[facturaKey]) {
                        ncPorFactura[facturaKey] = [];
                    }
                    ncPorFactura[facturaKey].push({
                        numero: nc.name,
                        fecha: nc.date,
                        total: nc.total || 0,
                        balance: nc.balance || 0
                    });
                }
            });

            // Solo facturas - las NC y RC se asocian a cada una
            const documentos = [];

            facturas.forEach(f => {
                if (f.customer?.identification === nit) {
                    const dueDate = f.payments?.[0]?.due_date || null;
                    const facturaName = f.name || `${f.prefix}-${f.number}`;

                    // Buscar pagos (RC) asociados
                    const llavesPosibles = [facturaName, `FV-2-${f.number}`, `FV-1-${f.number}`, `${f.prefix}-${f.number}`];
                    let pagosFactura = [];
                    for (const llave of llavesPosibles) {
                        if (pagosPorFactura[llave]) {
                            pagosFactura = pagosPorFactura[llave];
                            break;
                        }
                    }

                    // Buscar notas crédito asociadas
                    let notasCreditoFactura = [];
                    for (const llave of llavesPosibles) {
                        if (ncPorFactura[llave]) {
                            notasCreditoFactura = ncPorFactura[llave];
                            break;
                        }
                    }

                    // Calcular totales
                    const totalPagadoRC = pagosFactura
                        .filter(p => p.movimiento === 'Credit')
                        .reduce((sum, p) => sum + p.valor, 0);

                    const totalNC = notasCreditoFactura.reduce((sum, nc) => sum + nc.total, 0);

                    // Saldo calculado = Total - Pagos RC - Notas Crédito
                    const saldoCalculado = (f.total || 0) - totalPagadoRC - totalNC;
                    const saldoReportado = f.balance || 0;
                    const diferencia = Math.abs(saldoReportado - saldoCalculado);
                    const hayDiscrepancia = diferencia > 1;

                    // Determinar estado
                    let estado = 'pendiente';
                    if (totalNC >= (f.total || 0) * 0.99) { // 99% para tolerancia
                        estado = 'anulada';
                    } else if (saldoReportado === 0 && totalPagadoRC > 0) {
                        estado = 'pagada';
                    } else if (saldoReportado === 0) {
                        estado = 'saldada';
                    } else if (totalNC > 0) {
                        estado = 'nc_parcial';
                    }

                    documentos.push({
                        numero: `${f.prefix || 'FE'}-${f.number}`,
                        nombreSiigo: facturaName,
                        fecha: f.date,
                        fechaVencimiento: dueDate,
                        total: f.total || 0,
                        balance: f.balance || 0,
                        pagos: pagosFactura,
                        notasCredito: notasCreditoFactura,
                        totalPagadoRC: totalPagadoRC,
                        totalNC: totalNC,
                        saldoCalculado: saldoCalculado,
                        hayDiscrepancia: hayDiscrepancia,
                        diferencia: diferencia,
                        estado: estado
                    });
                }
            });

            // Ordenar por fecha descendente
            documentos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            // Filtrar si está activo el checkbox
            const documentosFiltrados = cxcOcultarSaldados
                ? documentos.filter(d => d.balance !== 0)
                : documentos;

            // Calcular totales
            const totalFacturado = documentos.reduce((sum, d) => sum + d.total, 0);
            const totalNCGlobal = documentos.reduce((sum, d) => sum + d.totalNC, 0);
            const totalPagadoGlobal = documentos.reduce((sum, d) => sum + d.totalPagadoRC, 0);
            const totalPendiente = documentos.reduce((sum, d) => sum + d.balance, 0);
            const documentosConDiscrepancia = documentos.filter(d => d.hayDiscrepancia).length;
            const facturasAnuladas = documentos.filter(d => d.estado === 'anulada').length;

            // Generar HTML de la tabla
            const filasHTML = documentosFiltrados.map((d, idx) => {
                const tieneDetalle = d.pagos.length > 0 || d.notasCredito.length > 0;

                // Determinar clase y badge según estado
                let estadoBadge = '';
                let balanceClass = 'saldo-pendiente';
                if (d.estado === 'anulada') {
                    estadoBadge = '<span style="background: #dc3545; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">ANULADA</span>';
                    balanceClass = 'saldo-cero';
                } else if (d.estado === 'pagada') {
                    estadoBadge = '<span style="background: var(--verde); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">PAGADA</span>';
                    balanceClass = 'saldo-cero';
                } else if (d.estado === 'saldada') {
                    balanceClass = 'saldo-cero';
                } else if (d.estado === 'nc_parcial') {
                    estadoBadge = '<span style="background: var(--teal-principal); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">NC PARCIAL</span>';
                }

                const discrepanciaIcon = d.hayDiscrepancia ? '<span style="color: var(--naranja); margin-left: 4px;" title="Discrepancia detectada">⚠</span>' : '';

                // Calcular aging basado en fecha de vencimiento
                let agingHTML = '-';
                if (d.fechaVencimiento && d.balance > 0) {
                    const hoy = new Date();
                    const fechaVenc = new Date(d.fechaVencimiento);
                    const diasDesdeVencimiento = Math.floor((hoy - fechaVenc) / (1000 * 60 * 60 * 24));

                    if (diasDesdeVencimiento < 0) {
                        // Aún no vence
                        agingHTML = '<span style="background: var(--verde); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600;">Por vencer</span>';
                    } else if (diasDesdeVencimiento <= 30) {
                        agingHTML = '<span style="background: var(--amarillo); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600;">1-30 días</span>';
                    } else if (diasDesdeVencimiento <= 60) {
                        agingHTML = '<span style="background: var(--naranja); color: white; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600;">31-60 días</span>';
                    } else if (diasDesdeVencimiento <= 90) {

        // Toggle para expandir/colapsar pagos de una factura
        function togglePagosRow(idx) {
            const pagosRow = document.getElementById(`pagos-${idx}`);
            const expandIcon = document.getElementById(`expand-${idx}`);

        // Toggle para ocultar/mostrar documentos saldados
        function toggleOcultarSaldados(checked) {
            cxcOcultarSaldados = checked;
            renderDetalleCxC();
        }

        // Calcular ventas mensuales del año seleccionado para análisis
        function calcularVentasMensualesConciliacion() {
            const ventasPorMes = {};
            for (let m = 1; m <= 12; m++) {
                ventasPorMes[m] = { ventas: 0, nc: 0, neto: 0, facturas: 0, notasCredito: 0 };
            }

            // Sumar facturas (ventas brutas) del año seleccionado
            facturas.forEach(f => {
                if (!f.date) return;
                const anio = parseInt(f.date.substring(0, 4));
                const mes = parseInt(f.date.substring(5, 7));

                if (anio === anioAnalisis) {
                    // Aplicar filtros de cliente y línea
                    if (filtros.cliente) {
                        const nitFactura = f.customer?.identification || '';
                        if (nitFactura !== filtros.cliente) return;
                    }
                    if (filtros.lineaNegocio) {
                        const lineaFactura = LINEAS_NEGOCIO[f.cost_center] || 'Sin asignar';
                        if (lineaFactura !== filtros.lineaNegocio) return;
                    }

                    // Sumar valor base (qty * price) - coincide con reporte SIIGO
                    let totalFactura = 0;
                    (f.items || []).forEach(item => {
                        const qty = item.quantity || 0;
                        const price = item.price || 0;
                        totalFactura += qty * price;
                    });

                    ventasPorMes[mes].ventas += totalFactura;
                    ventasPorMes[mes].facturas += 1;
                }
            });

            // Restar notas crédito del año seleccionado
            notasCredito.forEach(nc => {
                if (!nc.date) return;
                const anio = parseInt(nc.date.substring(0, 4));
                const mes = parseInt(nc.date.substring(5, 7));

                if (anio === anioAnalisis) {
                    // Aplicar filtros de cliente y línea
                    if (filtros.cliente) {
                        const nitNC = nc.customer?.identification || '';
                        if (nitNC !== filtros.cliente) return;
                    }
                    if (filtros.lineaNegocio) {
                        const lineaNC = LINEAS_NEGOCIO[nc.cost_center] || 'Sin asignar';
                        if (lineaNC !== filtros.lineaNegocio) return;
                    }

                    // Sumar valor base de NC (qty * price)
                    let totalNC = 0;
                    (nc.items || []).forEach(item => {
                        const qty = item.quantity || 0;
                        const price = item.price || 0;
                        totalNC += qty * price;
                    });

                    ventasPorMes[mes].nc += totalNC;
                    ventasPorMes[mes].notasCredito += 1;
                }
            });

            // Calcular neto (ventas - NC)
            for (let m = 1; m <= 12; m++) {
                ventasPorMes[m].neto = ventasPorMes[m].ventas - ventasPorMes[m].nc;
                // Para compatibilidad, mantener 'total' como el neto
                ventasPorMes[m].total = ventasPorMes[m].neto;
            }

            return ventasPorMes;
        }

        // Renderizar gráfica de conciliación
        function renderGraficaConciliacion(ventasMensuales, mesSeleccionado) {
            // Encontrar el máximo para escalar (usando neto)
            let maxValor = 0;
            for (let m = 1; m <= 12; m++) {
                if (ventasMensuales[m].neto > maxValor) {
                    maxValor = ventasMensuales[m].neto;
                }
            }

            // Calcular totales anuales
            let totalVentas = 0, totalNC = 0, totalNeto = 0;
            for (let m = 1; m <= 12; m++) {
                totalVentas += ventasMensuales[m].ventas;
                totalNC += ventasMensuales[m].nc;
                totalNeto += ventasMensuales[m].neto;
            }

            const barrasHTML = MESES.map((nombreMes, index) => {
                const mes = index + 1;
                const data = ventasMensuales[mes];
                const altura = maxValor > 0 ? (data.neto / maxValor) * 200 : 0;
                const isSelected = mes === mesSeleccionado;
                const etiqueta = data.neto > 0 ? formatCompacto(data.neto) : '$0';

                const tooltipText = `${nombreMes} ${anioAnalisis}: Ventas ${formatCurrency(data.ventas)} - NC ${formatCurrency(data.nc)} = Neto ${formatCurrency(data.neto)}`;

                return `
                    <div class="conciliacion-bar-container">
                        <div class="conciliacion-bar ${isSelected ? 'selected' : ''}"
                             style="height: ${Math.max(altura, 4)}px"
                             onclick="seleccionarMesConciliacion(${mes})"
                             data-tooltip="${tooltipText}">
                            <span class="conciliacion-bar-label">${etiqueta}</span>
                        </div>
                        <span class="conciliacion-month-label">${nombreMes.substring(0, 3)}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="conciliacion-chart">
                    ${barrasHTML}
                </div>
                <div class="conciliacion-total" style="display: flex; gap: 32px; flex-wrap: wrap;">
                    <div>
                        <span class="conciliacion-total-label">Ventas Brutas:</span>
                        <span class="conciliacion-total-value">${formatCurrency(totalVentas)}</span>
                    </div>
                    <div>
                        <span class="conciliacion-total-label" style="color: var(--rojo);">Notas Crédito:</span>
                        <span class="conciliacion-total-value" style="color: var(--rojo);">-${formatCurrency(totalNC)}</span>
                    </div>
                    <div>
                        <span class="conciliacion-total-label" style="color: var(--verde);">Ventas Netas ${anioAnalisis}:</span>
                        <span class="conciliacion-total-value" style="color: var(--verde);">${formatCurrency(totalNeto)}</span>
                    </div>
                </div>
            `;
        }

        // Función para seleccionar mes desde la gráfica
        function seleccionarMesConciliacion(mes) {
            filtros.cierreAnio = String(anioAnalisis);
            filtros.cierreMes = String(mes);
            const kpis = calcularKPIs(aplicarFiltros(facturasProcessed));
            const opciones = obtenerOpcionesFiltros(facturasProcessed);
            renderDashboard(kpis, opciones, aplicarFiltros(facturasProcessed));
        }

        // Función para cambiar el año de análisis
        function cambiarAnioAnalisis(nuevoAnio) {
            anioAnalisis = parseInt(nuevoAnio);
            // Resetear filtros de mes y cliente
            filtros.cierreAnio = String(anioAnalisis);
            filtros.cierreMes = String(new Date().getMonth() + 1);
            filtros.clienteConciliacion = '';  // Resetear cliente seleccionado
            const kpis = calcularKPIs(aplicarFiltros(facturasProcessed));
            const opciones = obtenerOpcionesFiltros(facturasProcessed);
            renderDashboard(kpis, opciones, aplicarFiltros(facturasProcessed));
        }

        // Función para seleccionar cliente desde la tabla de Ventas Netas por Cliente
        function seleccionarClienteConciliacion(nit) {
            // Toggle: si ya está seleccionado, deseleccionar
            if (filtros.clienteConciliacion === nit) {
                filtros.clienteConciliacion = '';
            } else {
                filtros.clienteConciliacion = nit;
            }
            const kpis = calcularKPIs(aplicarFiltros(facturasProcessed));
            const opciones = obtenerOpcionesFiltros(facturasProcessed);
            renderDashboard(kpis, opciones, aplicarFiltros(facturasProcessed));
        }

        function renderFilasDetalleConciliacion(facturasDelPeriodo) {
            return facturasDelPeriodo.map(f => {
                const nit = f.customer?.identification || 'N/A';
                const clienteInfo = clientesMap[nit] || { nombre: nit };

                // Calcular valores - valorBruto = qty * price (coincide con SIIGO)
                let valorBruto = 0, iva = 0, retencion = 0;
                (f.items || []).forEach(item => {
                    valorBruto += (item.price || 0) * (item.quantity || 1);
                    (item.taxes || []).forEach(tax => {
                        if (tax.type === 'IVA') iva += tax.value || 0;
                        else retencion += tax.value || 0;
                    });
                });
                (f.retentions || []).forEach(ret => {
                    retencion += ret.value || 0;
                });

                // Total = valorBruto + IVA - retención
                const totalFactura = valorBruto + iva - retencion;

                return `
                    <tr>
                        <td><strong>${f.name || f.prefix + '-' + f.number}</strong></td>
                        <td>${f.date}</td>
                        <td style="font-family: monospace; font-size: 11px;">${nit}</td>
                        <td>${clienteInfo.nombre}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(valorBruto)}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(iva)}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(retencion)}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; background: #f0fdf4;">${formatCurrency(totalFactura)}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums; color: var(--gris-medio);">${formatCurrency(f.total)}</td>
                    </tr>
                `;
            }).join('');
        }

        // Renderizar filas de detalle de notas crédito
        function renderFilasDetalleNC(notasCreditoDelPeriodo) {
            return notasCreditoDelPeriodo.map(nc => {
                const nit = nc.customer?.identification || 'N/A';
                const clienteInfo = clientesMap[nit] || { nombre: nit };

                // Calcular valores - valorBruto = qty * price
                let valorBruto = 0, iva = 0, retencion = 0;
                (nc.items || []).forEach(item => {
                    valorBruto += (item.price || 0) * (item.quantity || 1);
                    (item.taxes || []).forEach(tax => {
                        if (tax.type === 'IVA') iva += tax.value || 0;
                        else retencion += tax.value || 0;
                    });
                });
                (nc.retentions || []).forEach(ret => {
                    retencion += ret.value || 0;
                });

                // Total = valorBruto + IVA - retención
                const totalNC = valorBruto + iva - retencion;

                    <tr style="background: #fef2f2;">

        function renderTablaClientes(facturasFiltradas) {
            const carteraPorCliente = {};
            facturasFiltradas.forEach(f => {
                const key = f.clienteNit;
                if (!carteraPorCliente[key]) {
                    carteraPorCliente[key] = {
                        nit: key,
                        nombre: f.clienteNombre,
                        total: 0,
                        facturas: 0,
                        diasTotal: 0
                    };
                }
                carteraPorCliente[key].total += f.balance;
                carteraPorCliente[key].facturas += 1;
                carteraPorCliente[key].diasTotal += f.dias;
            });

            const clientesOrdenados = Object.values(carteraPorCliente)
                .sort((a, b) => b.total - a.total);

            return clientesOrdenados.map((c, i) => {
                const promedioDias = Math.round(c.diasTotal / c.facturas);
                let rowClass = '';
                if (promedioDias > 90) rowClass = 'row-danger';
                else if (promedioDias > 60) rowClass = 'row-warning';

                return `
                    <tr class="${rowClass}">
                        <td>${i + 1}</td>
                        <td><strong>${c.nombre}</strong></td>
                        <td>${c.nit}</td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(c.total)}</td>
                        <td style="text-align: right;">${c.facturas}</td>
                        <td style="text-align: right;">${promedioDias} días</td>
                    </tr>
                `;
            }).join('');
        }

        function renderTablaLineas(facturasFiltradas, carteraTotal) {
            const carteraPorLinea = {};
            facturasFiltradas.forEach(f => {
                const linea = f.lineaNegocio;
                if (!carteraPorLinea[linea]) {
                    carteraPorLinea[linea] = { total: 0, facturas: 0 };
                }
                carteraPorLinea[linea].total += f.balance;
                carteraPorLinea[linea].facturas += 1;
            });

            const lineasOrdenadas = Object.entries(carteraPorLinea)
                .sort((a, b) => b[1].total - a[1].total);

            return lineasOrdenadas.map(([linea, data]) => {
                const porcentaje = carteraTotal > 0 ? (data.total / carteraTotal * 100).toFixed(1) : 0;
                return `
                    <tr>
                        <td><strong>${linea}</strong></td>
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(data.total)}</td>
                        <td style="text-align: right;">${porcentaje}%</td>
                        <td style="text-align: right;">${data.facturas}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderTablaVentasPorClienteAnio() {
            const clasificacion = clasificarClientesConVentas();
            const anios = clasificacion.anios;

            // Función para renderizar filas de clientes con click handler
            const renderFilasClientes = (clientes, badgeClass, badgeText) => {
                return clientes.map(c => {
                    const nombreEscapado = c.nombre.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                    return `
                    <tr class="cliente-row" data-nit="${c.nit}" data-nombre="${nombreEscapado}" onclick="seleccionarClienteTabla(this)">
                        <td>
                            ${c.nombre}
                            <span class="client-type-badge ${badgeClass}">${badgeText}</span>
                        </td>
                        <td style="font-size: 11px; color: var(--gris-medio);">${c.nit}</td>
                        ${anios.map(a => `
                            <td style="text-align: right; font-variant-numeric: tabular-nums;">
                                ${c.ventas[a] > 0 ? formatCurrency(c.ventas[a]) : '-'}
                            </td>
                        `).join('')}
                        <td style="text-align: right; font-weight: 600; font-variant-numeric: tabular-nums;">
                            ${formatCurrency(c.totalGeneral)}
                        </td>
                    </tr>
                `}).join('');
            };

            // Función para renderizar fila de subtotal
            const renderSubtotal = (subtotal, label, count) => `
                <tr class="subtotal-row">
                    <td colspan="2"><strong>${label} (${count} clientes)</strong></td>
                    ${anios.map(a => `
                        <td style="text-align: right; font-variant-numeric: tabular-nums;">
                            ${formatCurrency(subtotal[a])}

                    `).join('')}
                    <td style="text-align: right; font-variant-numeric: tabular-nums;">
                        ${formatCurrency(subtotal.total)}
                    </td>
                </tr>
            `;

            // Calcular gran total
            const granTotal = {};
            anios.forEach(a => {

        // Formato de valores en millones
        function formatMillones(valor) {
            if (valor >= 1000000000) {
                return '$' + Math.round(valor / 1000000000) + 'B';
            } else if (valor >= 1000000) {
                return '$' + Math.round(valor / 1000000) + 'M';
            } else if (valor >= 1000) {
                return '$' + Math.round(valor / 1000) + 'K';
            }
            return formatCurrency(valor);
        }

        // Formato compacto para etiquetas de barras (ej: $8M)
        function formatCompacto(valor) {
            if (valor === 0) return '';
            if (valor >= 1000000000) {
                return '$' + (valor / 1000000000).toFixed(2) + 'B';
            } else if (valor >= 1000000) {
                return '$' + (valor / 1000000).toFixed(2) + 'M';
            } else if (valor >= 1000) {
                return '$' + (valor / 1000).toFixed(2) + 'K';
            }
            return '$' + Math.round(valor);
        }

        // Formato completo para tooltip (ej: $8,487,354)
        function formatCompleto(valor) {
            return '$' + Math.round(valor).toLocaleString('es-CO');
        }

        const MESES_CORTOS = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

            ANIOS_VENTAS.forEach(anio => {
                meses.forEach(mes => {

                    if (valor > maxValor) {

            // Generar escalas del eje Y
            const escalaY = [maxValor, maxValor * 0.75, maxValor * 0.5, maxValor * 0.25, 0];

            const barsHTML = meses.map(mes => {
                const bars = ANIOS_VENTAS.map(anio => {
                    const data = ventasPorMesAnio[anio][mes] || { neto: 0 };
                    const valor = data.neto || 0;
                    const altura = maxValor > 0 ? (Math.max(0, valor) / maxValor) * 180 : 0;
                    const etiqueta = formatCompacto(valor);

        function renderHorizonteBar(carteraPorHorizonte, total) {
            const horizontes = [
                { key: '0-30', clase: 'h-0-30', label: '0-30 días', color: '#4AB866' },
                { key: '31-60', clase: 'h-31-60', label: '31-60 días', color: '#418D93' },
                { key: '61-90', clase: 'h-61-90', label: '61-90 días', color: '#f97316' },
                { key: '91-120', clase: 'h-91-120', label: '91-120 días', color: '#ef4444' },
                { key: '>120', clase: 'h-120-plus', label: '> 120 días', color: '#991b1b' }
            ];

            if (total === 0) {
                return '<p style="text-align: center; color: var(--gris-medio); padding: 20px;">No hay datos para mostrar</p>';
            }

            const segments = horizontes
                .filter(h => carteraPorHorizonte[h.key] > 0)
                .map(h => {
                    const percent = (carteraPorHorizonte[h.key] / total) * 100;
                    return `<div class="horizonte-segment ${h.clase}" style="width: ${Math.max(percent, 5)}%"
                            title="${h.label}: ${formatCurrency(carteraPorHorizonte[h.key])} (${percent.toFixed(1)}%)">
                            ${percent >= 10 ? percent.toFixed(0) + '%' : ''}
                           </div>`;
                }).join('');

            const legend = horizontes.map(h => `
                <div class="legend-item">
                    <div class="legend-dot" style="background: ${h.color}"></div>
                    <span>${h.label}: ${formatCurrency(carteraPorHorizonte[h.key])}</span>
                </div>
            `).join('');

            return `
                <div class="horizonte-bar">${segments}</div>
                <div class="horizonte-legend">${legend}</div>
            `;
        }

        function renderCarteraPorLinea(carteraPorLinea, total) {
            const sorted = Object.entries(carteraPorLinea)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 10);

            if (sorted.length === 0) {
                return '<p style="text-align: center; color: var(--gris-medio); padding: 20px;">No hay datos para mostrar</p>';
            }

            const maxValue = sorted[0]?.[1] || 1;

            return sorted.map(([linea, valor]) => {
                const percent = (valor / maxValue) * 100;
                return `
                    <div class="linea-item">
                        <span class="linea-name">${linea}</span>
                        <div class="linea-bar-container">
                            <div class="linea-bar" style="width: ${percent}%"></div>

                        <span class="linea-value">${formatCurrency(valor)}</span>
                    </div>
                `;
            }).join('');
        }

        function abrirDropdownClientes() {
            const dropdown = document.getElementById('clienteDropdown');
            dropdown.classList.add('open');

            // Mostrar todas las opciones al abrir
            const opciones = dropdown.querySelectorAll('.search-select-option');
            opciones.forEach(opt => opt.style.display = 'block');
        }

        function cerrarDropdownClientes() {
            const dropdown = document.getElementById('clienteDropdown');
            if (dropdown) {
                dropdown.classList.remove('open');
            }
        }

        function filtrarClientes(texto) {
            const dropdown = document.getElementById('clienteDropdown');
            const opciones = dropdown.querySelectorAll('.search-select-option');
            const textoLower = texto.toLowerCase().trim();
            let hayResultados = false;

            opciones.forEach((opt, index) => {
                // La primera opción es "Todos los clientes"
                if (index === 0) {
                    opt.style.display = textoLower === '' ? 'block' : 'none';
                    return;
                }

                const nombre = opt.getAttribute('data-nombre') || opt.textContent;
                if (nombre.toLowerCase().includes(textoLower)) {
                    opt.style.display = 'block';
                    hayResultados = true;
                } else {
                    opt.style.display = 'none';
                }
            });

            // Mostrar mensaje si no hay resultados
            let noResultsMsg = dropdown.querySelector('.no-results');
            if (!hayResultados && textoLower !== '') {
                if (!noResultsMsg) {
                    noResultsMsg = document.createElement('div');
                    noResultsMsg.className = 'search-select-option no-results';
                    noResultsMsg.textContent = 'No se encontraron clientes';
                    dropdown.appendChild(noResultsMsg);
                }
                noResultsMsg.style.display = 'block';
            } else if (noResultsMsg) {
                noResultsMsg.style.display = 'none';
            }

            dropdown.classList.add('open');
        }

                clearBtn.classList.remove('visible');
            } else {
                input.value = nombre;
                clearBtn.classList.add('visible');
            }

            cerrarDropdownClientes();
            actualizarFiltro('cliente', nit);

        // ============================================
        // MAIN
        // ============================================
        async function cargarDatos() {
            // Ajustar logo dinámicamente según el entorno
            const headerLogo = document.getElementById('headerLogo');
            if (headerLogo) headerLogo.src = LOGO_URL;

            const btnRefresh = document.getElementById('btnRefresh');
            btnRefresh.disabled = true;

            document.getElementById('mainContent').innerHTML = `
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <span>Cargando datos de Siigo...</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                    </div>
                    <span id="progressText" style="margin-top: 8px; font-size: 12px;">Conectando...</span>
                </div>
            `;

            try {
                await autenticar();

                updateProgress(20, 'Cargando clientes...');
                const clientesData = await fetchPaginated('/v1/customers', 100);

                clientesData.forEach(c => {
                    const nit = c.identification;
                    const nombre = Array.isArray(c.name) ? c.name.join(' ') : c.name;
                    clientesMap[nit] = { nit, nombre: nombre || nit };
                });

                updateProgress(40, 'Cargando facturas...');
                facturas = await fetchPaginated('/v1/invoices', 100);

                updateProgress(70, 'Cargando notas crédito...');
                notasCredito = await fetchPaginated('/v1/credit-notes', 100);

                updateProgress(85, 'Cargando recibos de caja (pagos)...');
                vouchers = await fetchPaginated('/v1/vouchers', 100);

                // Construir índice de pagos por factura
                updateProgress(95, 'Procesando pagos...');
                pagosPorFactura = construirIndicePagos(vouchers);

                facturasProcessed = procesarDatos();

                const opciones = obtenerOpcionesFiltros(facturasProcessed);
                const facturasFiltradas = aplicarFiltros(facturasProcessed);
                const kpis = calcularKPIs(facturasFiltradas);

                updateProgress(100, 'Listo!');
                setTimeout(() => renderDashboard(kpis, opciones, facturasFiltradas), 300);

            } catch (error) {
                console.error('Error:', error);
                renderError(error.message || 'Error al cargar datos. Verifica tu conexión.');
            } finally {
                btnRefresh.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', cargarDatos);

        // ============================================
        // TOOLTIP PARA GRÁFICOS
        // ============================================
        const chartTooltip = document.getElementById('chartTooltip');

        function showChartTooltip(e, text) {
            chartTooltip.textContent = text;
            chartTooltip.classList.add('visible');
            updateTooltipPosition(e);
        }

        function hideChartTooltip() {
            chartTooltip.classList.remove('visible');
        }

        function updateTooltipPosition(e) {
            const x = e.clientX;
            const y = e.clientY;
            const tooltipWidth = chartTooltip.offsetWidth;
            const tooltipHeight = chartTooltip.offsetHeight;

            // Posicionar arriba del cursor, centrado
            let left = x - tooltipWidth / 2;
            let top = y - tooltipHeight - 15;

            // Ajustar si se sale de la pantalla
            if (left < 10) left = 10;
            if (left + tooltipWidth > window.innerWidth - 10) {
                left = window.innerWidth - tooltipWidth - 10;
            }
            if (top < 10) top = y + 20; // Mostrar abajo si no hay espacio arriba

            chartTooltip.style.left = left + 'px';
            chartTooltip.style.top = top + 'px';
        }

        // Event delegation para barras de gráficos (incluye .chart-bar y .conciliacion-bar)
        document.addEventListener('mouseover', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar && bar.dataset.tooltip) {
                showChartTooltip(e, bar.dataset.tooltip);
            }
        });

        document.addEventListener('mousemove', function(e) {
            if (chartTooltip.classList.contains('visible')) {
                updateTooltipPosition(e);
            }
        });

        document.addEventListener('mouseout', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar) {
                hideChartTooltip();
            }
        });

            try {
                // Obtener el período seleccionado

                    const mes = parseInt(filtros.cierreMes);
                    mesSeleccionado = mes;

                // Calcular período

                // Filtrar facturas y NC del período
                const facturasDelPeriodo = facturas.filter(f => {
                    if (!f.date) return false;
                    if (filtros.cliente) {
                        if ((f.customer?.identification || '') !== filtros.cliente) return false;
                    }
                    return f.date >= periodoInicio && f.date <= periodoFin;
                });

                const notasCreditoDelPeriodo = notasCredito.filter(nc => {
                    if (!nc.date) return false;
                    if (filtros.cliente) {
                        if ((nc.customer?.identification || '') !== filtros.cliente) return false;
                    }
                    return nc.date >= periodoInicio && nc.date <= periodoFin;
                });

                // Calcular ventas por cliente (neto)
                const ventasPorCliente = {};
                facturasDelPeriodo.forEach(f => {
                    const nit = f.customer?.identification || 'N/A';
                    const clienteInfo = clientesMap[nit] || { nombre: nit };
                    if (!ventasPorCliente[nit]) {
                        ventasPorCliente[nit] = { nit, nombre: clienteInfo.nombre, facturas: 0, nc: 0, valorBruto: 0, total: 0 };
                    }
                    ventasPorCliente[nit].facturas += 1;
                    let valorFactura = 0;
                    (f.items || []).forEach(item => {
                        valorFactura += (item.price || 0) * (item.quantity || 1);
                    });
                    ventasPorCliente[nit].valorBruto += valorFactura;
                    ventasPorCliente[nit].total += valorFactura;
                });

                notasCreditoDelPeriodo.forEach(nc => {
                    const nit = nc.customer?.identification || 'N/A';

                    if (!ventasPorCliente[nit]) {
                        ventasPorCliente[nit] = { nit, nombre: clienteInfo.nombre, facturas: 0, nc: 0, valorBruto: 0, total: 0 };
                    }
                    ventasPorCliente[nit].nc += 1;
                    let valorNC = 0;
                    (nc.items || []).forEach(item => {
                        valorNC += (item.price || 0) * (item.quantity || 1);
                    });
                    ventasPorCliente[nit].valorBruto -= valorNC;
                    ventasPorCliente[nit].total -= valorNC;

                const clientesArray = Object.values(ventasPorCliente).sort((a, b) => b.total - a.total);

                    totalFacturas++;
                    (f.items || []).forEach(item => {

                });
                notasCreditoDelPeriodo.forEach(nc => {
