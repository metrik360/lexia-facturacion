        const chartTooltip = document.getElementById('chartTooltip');

        function showChartTooltip(e, text) {
            chartTooltip.textContent = text;
            chartTooltip.classList.add('visible');
            updateTooltipPosition(e);
        }

        function hideChartTooltip() {
            chartTooltip.classList.remove('visible');
        }

        function updateTooltipPosition(e) {
            const x = e.clientX;
            const y = e.clientY;
            const tooltipWidth = chartTooltip.offsetWidth;
            const tooltipHeight = chartTooltip.offsetHeight;

            // Posicionar arriba del cursor, centrado
            let left = x - tooltipWidth / 2;
            let top = y - tooltipHeight - 15;

            // Ajustar si se sale de la pantalla
            if (left < 10) left = 10;
            if (left + tooltipWidth > window.innerWidth - 10) {
                left = window.innerWidth - tooltipWidth - 10;
            }
            if (top < 10) top = y + 20; // Mostrar abajo si no hay espacio arriba

            chartTooltip.style.left = left + 'px';
            chartTooltip.style.top = top + 'px';
        }

        // Event delegation para barras de gráficos (incluye .chart-bar y .conciliacion-bar)
        document.addEventListener('mouseover', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar && bar.dataset.tooltip) {
                showChartTooltip(e, bar.dataset.tooltip);
            }
        });

        document.addEventListener('mousemove', function(e) {
            if (chartTooltip.classList.contains('visible')) {
                updateTooltipPosition(e);
            }
        });

        document.addEventListener('mouseout', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar) {
                hideChartTooltip();
            }
        });

        // ============================================
        // EXPORTAR A PDF
        // ============================================
        async function exportarAnalisisPDF() {
            const btn = document.getElementById('btnExportPDF');
            btn.disabled = true;
            btn.innerHTML = `<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle></svg> Generando...`;

            try {
                // === INFORMACIÓN DE FILTROS APLICADOS ===
                const filtrosAplicados = [];
                let clienteNombre = null;
                if (filtros.cliente) {
                    clienteNombre = clientesMap[filtros.cliente]?.nombre || filtros.cliente;
                    filtrosAplicados.push(`Cliente: ${clienteNombre}`);
                }
                if (filtros.lineaNegocio) {
                    filtrosAplicados.push(`Centro de Costos: ${filtros.lineaNegocio}`);
                }
                // Determinar periodo de análisis
                const mesCorteLabel = filtros.cierreMes
                    ? MESES[parseInt(filtros.cierreMes) - 1]
                    : null;
                const periodoLabel = mesCorteLabel
                    ? `Enero - ${mesCorteLabel} ${anioAnalisis}`
                    : `Año completo ${anioAnalisis}`;
                filtrosAplicados.push(periodoLabel);

                const tituloFiltros = filtrosAplicados.length > 1
                    ? filtrosAplicados.join(' | ')
                    : `Todos los datos - ${periodoLabel}`;

                // === FECHA Y HORA DE GENERACIÓN ===
                const ahora = new Date();
                const fechaGeneracion = ahora.toLocaleDateString('es-CO', {
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
                });
                const horaGeneracion = ahora.toLocaleTimeString('es-CO', {
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                });

                // === CALCULAR DATOS PARA GRÁFICAS (últimos 4 años respecto al año seleccionado) ===
                const anioBase = parseInt(anioAnalisis);
                const ultimos4Anios = [anioBase - 3, anioBase - 2, anioBase - 1, anioBase];
                const ventasPorMesAnio = calcularVentasMensuales();

                // Mes de análisis para filtro YTD (Year-To-Date)
                // Para años anteriores al actual, usar diciembre (año completo)
                const anioActualReal = new Date().getFullYear();
                const mesAnalisisPDF = anioBase < anioActualReal
                    ? 12
                    : (filtros.cierreMes ? parseInt(filtros.cierreMes) : (new Date().getMonth() + 1));
                const labelMesCorto = MESES_CORTOS[mesAnalisisPDF - 1]; // Ej: "Mar" o "Dic"

                // Calcular ventas YTD para los últimos 4 años
                const ventasYTD = {};
                ultimos4Anios.forEach(anio => {
                    ventasYTD[anio] = {};
                    let acumulado = 0;
                    for (let mes = 1; mes <= 12; mes++) {
                        const valorMes = ventasPorMesAnio[anio]?.[mes]?.neto || 0;
                        acumulado += valorMes;
                        ventasYTD[anio][mes] = acumulado;
                    }
                });

                // Calcular totales por año
                const totalesPorAnio = {};
                ultimos4Anios.forEach(anio => {
                    let total = 0;
                    for (let mes = 1; mes <= 12; mes++) {
                        total += ventasPorMesAnio[anio]?.[mes]?.neto || 0;
                    }
                    totalesPorAnio[anio] = total;
                });

                // === CALCULAR CARTERA REAL CON FILTROS ===
                const facturasFiltradas = aplicarFiltros(facturasProcessed);
                const kpis = calcularKPIs(facturasFiltradas);

                // === CALCULAR DATOS DEL PERIODO SELECCIONADO (hasta mesAnalisisPDF) ===
                const ventasMensualesAnio = calcularVentasMensualesConciliacion();
                let totalVentasAnual = 0, totalNCAnual = 0, totalNumFacturas = 0, totalNumNC = 0;
                for (let m = 1; m <= mesAnalisisPDF; m++) {
                    totalVentasAnual += ventasMensualesAnio[m].ventas;
                    totalNCAnual += ventasMensualesAnio[m].nc;
                    totalNumFacturas += ventasMensualesAnio[m].facturas || 0;
                    totalNumNC += ventasMensualesAnio[m].notasCredito || 0;
                }

                // === CALCULAR VENTAS POR CLIENTE (últimos 4 años, YTD) ===
                const ventasPorClienteAnio = {};
                facturas.forEach(f => {
                    if (!f.date) return;
                    const anio = parseInt(f.date.substring(0, 4));
                    if (!ultimos4Anios.includes(anio)) return;
                    const mesFact = parseInt(f.date.substring(5, 7));
                    if (mesFact > mesAnalisisPDF) return; // Filtro YTD

                    // Aplicar filtro de centro de costos si está activo
                    if (filtros.lineaNegocio) {
                        const lineaFactura = LINEAS_NEGOCIO[f.cost_center] || 'Sin asignar';
                        if (lineaFactura !== filtros.lineaNegocio) return;
                    }

                    const nit = f.customer?.identification || 'N/A';
                    const nombreCliente = clientesMap[nit]?.nombre || f.customer?.name || nit;
                    const fCurrency = f.currency || null;

                    let totalFactura = 0;
                    (f.items || []).forEach(item => {
                        totalFactura += (item.quantity || 0) * (item.price || 0);
                    });
                    totalFactura = convertirACOP(totalFactura, fCurrency);

                    if (!ventasPorClienteAnio[nit]) {
                        ventasPorClienteAnio[nit] = { nit, nombre: nombreCliente, anios: {} };
                        ultimos4Anios.forEach(a => ventasPorClienteAnio[nit].anios[a] = 0);
                    }
                    ventasPorClienteAnio[nit].anios[anio] += totalFactura;
                });

                // Restar notas crédito por cliente (YTD)
                notasCredito.forEach(nc => {
                    if (!nc.date) return;
                    const anio = parseInt(nc.date.substring(0, 4));
                    if (!ultimos4Anios.includes(anio)) return;
                    const mesNC = parseInt(nc.date.substring(5, 7));
                    if (mesNC > mesAnalisisPDF) return; // Filtro YTD

                    if (filtros.lineaNegocio) {
                        const lineaNC = LINEAS_NEGOCIO[nc.cost_center] || 'Sin asignar';
                        if (lineaNC !== filtros.lineaNegocio) return;
                    }

                    const nit = nc.customer?.identification || 'N/A';
                    const ncCurrency = nc.currency || null;

                    let totalNC = 0;
                    (nc.items || []).forEach(item => {
                        totalNC += (item.quantity || 0) * (item.price || 0);
                    });
                    totalNC = convertirACOP(totalNC, ncCurrency);

                    if (ventasPorClienteAnio[nit]) {
                        ventasPorClienteAnio[nit].anios[anio] -= totalNC;
                    }
                });

                // Filtrar solo clientes recurrentes (ventas en más de 1 año)
                const clientesRecurrentes = Object.values(ventasPorClienteAnio)
                    .filter(c => {
                        const aniosConVentas = ultimos4Anios.filter(a => c.anios[a] > 0).length;
                        return aniosConVentas > 1;
                    })
                    .map(c => {
                        c.totalGeneral = ultimos4Anios.reduce((sum, a) => sum + (c.anios[a] || 0), 0);
                        return c;
                    })
                    .sort((a, b) => b.totalGeneral - a.totalGeneral)
                    .slice(0, 15); // Top 15 clientes recurrentes

                // === CALCULAR VENTAS POR CENTRO DE COSTOS (últimos 4 años, YTD) ===
                const ventasPorCCAnio = {};
                facturas.forEach(f => {
                    if (!f.date) return;
                    const anio = parseInt(f.date.substring(0, 4));
                    if (!ultimos4Anios.includes(anio)) return;
                    const mesFact = parseInt(f.date.substring(5, 7));
                    if (mesFact > mesAnalisisPDF) return; // Filtro YTD

                    // Aplicar filtro de cliente si está activo
                    if (filtros.cliente) {
                        const nitFactura = f.customer?.identification || '';
                        if (nitFactura !== filtros.cliente) return;
                    }

                    const cc = LINEAS_NEGOCIO[f.cost_center] || 'Sin asignar';
                    const fCurrency = f.currency || null;

                    let totalFactura = 0;
                    (f.items || []).forEach(item => {
                        totalFactura += (item.quantity || 0) * (item.price || 0);
                    });
                    totalFactura = convertirACOP(totalFactura, fCurrency);

                    if (!ventasPorCCAnio[cc]) {
                        ventasPorCCAnio[cc] = { nombre: cc, anios: {} };
                        ultimos4Anios.forEach(a => ventasPorCCAnio[cc].anios[a] = 0);
                    }
                    ventasPorCCAnio[cc].anios[anio] += totalFactura;
                });

                // Restar notas crédito por centro de costos (YTD)
                notasCredito.forEach(nc => {
                    if (!nc.date) return;
                    const anio = parseInt(nc.date.substring(0, 4));
                    if (!ultimos4Anios.includes(anio)) return;
                    const mesNC = parseInt(nc.date.substring(5, 7));
                    if (mesNC > mesAnalisisPDF) return; // Filtro YTD

                    if (filtros.cliente) {
                        const nitNC = nc.customer?.identification || '';
                        if (nitNC !== filtros.cliente) return;
                    }

                    const cc = LINEAS_NEGOCIO[nc.cost_center] || 'Sin asignar';
                    const ncCurrency = nc.currency || null;

                    let totalNC = 0;
                    (nc.items || []).forEach(item => {
                        totalNC += (item.quantity || 0) * (item.price || 0);
                    });
                    totalNC = convertirACOP(totalNC, ncCurrency);

                    if (ventasPorCCAnio[cc]) {
                        ventasPorCCAnio[cc].anios[anio] -= totalNC;
                    }
                });

                // Ordenar centros de costos por total
                const centrosCostosOrdenados = Object.values(ventasPorCCAnio)
                    .map(cc => {
                        cc.totalGeneral = ultimos4Anios.reduce((sum, a) => sum + (cc.anios[a] || 0), 0);
                        return cc;
                    })
                    .sort((a, b) => b.totalGeneral - a.totalGeneral);

                // === CALCULAR DATOS DE CUENTAS POR COBRAR ===
                const hoyPDF = new Date();
                const cxcPorClientePDF = {};

                facturasProcessed.forEach(f => {
                    const nit = f.clienteNit || 'N/A';
                    const balance = f.balance || 0;

                    let dueDate = null;
                    if (f.dueDate) {
                        dueDate = new Date(f.dueDate);
                    } else if (f.fecha) {
                        dueDate = new Date(f.fecha);
                        dueDate.setDate(dueDate.getDate() + 30);
                    }

                    if (!cxcPorClientePDF[nit]) {
                        cxcPorClientePDF[nit] = {
                            nit: nit,
                            nombre: f.clienteNombre || nit,
                            vencido1a30: 0,
                            vencido31a60: 0,
                            vencido61a90: 0,
                            vencidoMas91: 0,
                            porVencer: 0,
                            totalCartera: 0
                        };
                    }

                    if (balance > 0 && dueDate) {
                        const diasVencido = Math.floor((hoyPDF - dueDate) / (1000 * 60 * 60 * 24));
                        if (diasVencido < 0) {
                            cxcPorClientePDF[nit].porVencer += balance;
                        } else if (diasVencido <= 30) {
                            cxcPorClientePDF[nit].vencido1a30 += balance;
                        } else if (diasVencido <= 60) {
                            cxcPorClientePDF[nit].vencido31a60 += balance;
                        } else if (diasVencido <= 90) {
                            cxcPorClientePDF[nit].vencido61a90 += balance;
                        } else {
                            cxcPorClientePDF[nit].vencidoMas91 += balance;
                        }
                    }
                });

                // Calcular total cartera por cliente
                Object.values(cxcPorClientePDF).forEach(c => {
                    c.totalCartera = c.vencido1a30 + c.vencido31a60 + c.vencido61a90 + c.vencidoMas91 + c.porVencer;

                    .sort((a, b) => b.totalCartera - a.totalCartera)
                    .slice(0, 20);

                // Totales CxC
                const totalesCxC = clientesCxCOrdenados.reduce((acc, c) => ({
                    vencido1a30: acc.vencido1a30 + c.vencido1a30,
                    vencido31a60: acc.vencido31a60 + c.vencido31a60,
                    vencido61a90: acc.vencido61a90 + c.vencido61a90,
                    vencidoMas91: acc.vencidoMas91 + c.vencidoMas91,
                    porVencer: acc.porVencer + c.porVencer,
                    totalCartera: acc.totalCartera + c.totalCartera
                }), { vencido1a30: 0, vencido31a60: 0, vencido61a90: 0, vencidoMas91: 0, porVencer: 0, totalCartera: 0 });

                // === COLORES PARA GRÁFICAS (degradado: claro→oscuro = antiguo→reciente) ===

                    [ultimos4Anios[1]]: '#4db6ac', // teal claro
                    [ultimos4Anios[2]]: '#00897b', // teal medio

                // === CALCULAR MÁXIMOS PARA GRÁFICAS ===

                ultimos4Anios.forEach(anio => {
                    for (let mes = 1; mes <= 12; mes++) {
                        const venta = ventasPorMesAnio[anio]?.[mes]?.neto || 0;
                        const acum = ventasYTD[anio]?.[mes] || 0;
                        if (venta > maxVentaMensual) maxVentaMensual = venta;
                        if (acum > maxVentaAcumulada) maxVentaAcumulada = acum;

                // === CREAR CONTENIDO PDF ===

                const estiloSeccion = 'page-break-inside: avoid; break-inside: avoid;';

                            <div style="text-align: right; flex: 1; margin-left: 20px;">

                                <p style="font-size: 10px; color: #418D93; margin: 3px 0 0 0; font-weight: 600;">${tituloFiltros}</p>
                            </div>
                        </div>

                        <!-- FECHA Y HORA -->

                            <div>
                                <span style="font-size: 8px; color: #64748b; text-transform: uppercase;">Generado</span>
                                <div style="font-size: 11px; font-weight: 600; color: #1e293b;">${fechaGeneracion} - ${horaGeneracion}</div>
                            </div>

                                        <td style="padding: 3px 4px; border: 1px solid #e5e7eb; text-align: right; vertical-align: middle; ${c.vencido31a60 === 0 ? 'color: #9ca3af;' : 'color: #f59e0b;'}">${c.vencido31a60 > 0 ? formatCurrency(c.vencido31a60) : '-'}</td>
                                        <td style="padding: 3px 4px; border: 1px solid #e5e7eb; text-align: right; vertical-align: middle; ${c.vencido61a90 === 0 ? 'color: #9ca3af;' : 'color: #ea580c;'}">${c.vencido61a90 > 0 ? formatCurrency(c.vencido61a90) : '-'}</td>
                                        <td style="padding: 3px 4px; border: 1px solid #e5e7eb; text-align: right; vertical-align: middle; ${c.vencidoMas91 === 0 ? 'color: #9ca3af;' : 'color: #dc2626; font-weight: 600;'}">${c.vencidoMas91 > 0 ? formatCurrency(c.vencidoMas91) : '-'}</td>
                                        <td style="padding: 3px 4px; border: 1px solid #e5e7eb; text-align: right; vertical-align: middle; ${c.porVencer === 0 ? 'color: #9ca3af;' : 'color: #16a34a;'}">${c.porVencer > 0 ? formatCurrency(c.porVencer) : '-'}</td>
                                        <td style="padding: 3px 4px; border: 1px solid #e5e7eb; text-align: right; vertical-align: middle; font-weight: 600; color: #dc2626;">${formatCurrency(c.totalCartera)}</td>
                                    </tr>
                                `).join('')}
                                <tr style="background: #dc2626; color: white; font-weight: 700;">
                                    <td style="padding: 4px; border: 1px solid #dc2626;">TOTAL</td>
                                    <td style="padding: 4px; border: 1px solid #dc2626; text-align: right;">${formatCurrency(totalesCxC.vencido1a30)}</td>
                                    <td style="padding: 4px; border: 1px solid #dc2626; text-align: right;">${formatCurrency(totalesCxC.vencido31a60)}</td>
                                    <td style="padding: 4px; border: 1px solid #dc2626; text-align: right;">${formatCurrency(totalesCxC.vencido61a90)}</td>
                                    <td style="padding: 4px; border: 1px solid #dc2626; text-align: right;">${formatCurrency(totalesCxC.vencidoMas91)}</td>
                                    <td style="padding: 4px; border: 1px solid #dc2626; text-align: right;">${formatCurrency(totalesCxC.porVencer)}</td>
                                    <td style="padding: 4px; border: 1px solid #991b1b; text-align: right; background: #991b1b;">${formatCurrency(totalesCxC.totalCartera)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    ` : ''}

                    <!-- ========== FOOTER ========== -->
                    <div style="margin-top: 15px; padding-top: 10px; padding-bottom: 20px; border-top: 1px solid #e5e7eb; page-break-inside: avoid; break-inside: avoid;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="font-size: 7px; color: #9ca3af;">
                                Lexia Abogados S.A.S. | Dashboard de Facturacion | Generado: ${fechaGeneracion}
                            </div>
                            <div style="display: flex; align-items: center; gap: 4px;">
                                <span style="font-size: 7px; color: #9ca3af;">Powered by</span>
                                <img src="https://i.ibb.co/sdb3Bpq5/M-trik-logo-iso.png" style="height: 14px;" crossorigin="anonymous">
                            </div>
                        </div>
                    </div>
                    <!-- Spacer para evitar corte en la última página -->
                    <div style="height: 30px;"></div>
                `;

                document.body.appendChild(pdfContent);

                // Configuración de html2pdf
                const opt = {
                    margin: [8, 10, 15, 10],
                    filename: `Lexia_Analisis_${anioAnalisis}${mesAnalisisPDF < 12 ? '_Corte' + labelMesCorto : ''}${filtros.cliente ? '_' + filtros.cliente : ''}${filtros.lineaNegocio ? '_' + filtros.lineaNegocio.replace(/\s/g, '') : ''}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        letterRendering: true
                    },
                    jsPDF: {
                        unit: 'mm',
                        format: 'letter',
                        orientation: 'portrait'
                    },
                    pagebreak: { mode: ['css', 'legacy'] }
                };

                await html2pdf().set(opt).from(pdfContent).save();

                document.body.removeChild(pdfContent);

            } catch (error) {
                console.error('Error al generar PDF:', error);
                alert('Error al generar el PDF. Por favor intenta de nuevo.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    </svg>
                    Exportar PDF
                `;
            }
        }
    </script>
</body>
</html>
