                    ${renderFiltroEstadoBar(filtroEstadoTodos, 'cambiarFiltroEstadoTodos')}
                </div>
            `;

            if (facturasFiltradas.length === 0) {
                return html + `<div style="text-align: center; padding: 40px; color: var(--gris-medio);">
                    No hay facturas en el período seleccionado (hasta ${anioAnalisisFacturacion})
                </div>`;
            }

            // Filtro de búsqueda de texto
            const filtroBusqueda = filtroDetalleTodos.toLowerCase().trim();

            // Construir índice de notas crédito por factura
            const ncPorFactura = {};
            notasCredito.forEach(nc => {
                if (nc.invoice?.name) {
                    if (nc.date) {
                        const anioNC = parseInt(nc.date.substring(0, 4));
                        if (anioNC > anioAnalisisFacturacion) return;
                    }
                    const facturaKey = nc.invoice.name;
                    if (!ncPorFactura[facturaKey]) {
                        ncPorFactura[facturaKey] = [];
                    }
                    const conceptoNC = (nc.items || []).map(i => i.description || i.code).filter(Boolean).join(', ');
                    // Convertir total de NC a COP si es moneda extranjera
                    const ncCurrency = nc.currency || null;
                    const totalNC = convertirACOP(nc.total || 0, ncCurrency);
                    ncPorFactura[facturaKey].push({
                        numero: nc.name,
                        fecha: nc.date,
                        total: totalNC,
                        concepto: conceptoNC
                    });
                }
            });

            // Construir índice de MR por número de factura
            const mrPorFactura = {};
            movimientosConFactura.forEach(mr => {
                if (mr.factura) {
                    if (mr.fecha) {
                        const anioMR = parseInt(mr.fecha.substring(0, 4));
                        if (anioMR > anioAnalisisFacturacion) return;
                    }
                    const facturaNum = mr.factura;
                    if (!mrPorFactura[facturaNum]) {
                        mrPorFactura[facturaNum] = [];
                    }
                    mrPorFactura[facturaNum].push({
                        documento: mr.documento || 'MR',
                        fecha: mr.fecha,
                        descripcion: mr.descripcion,
                        valor: mr.valor || 0
                    });
                }
            });

            // Agrupar por año
            const documentosPorAnio = {};

            facturasFiltradas.forEach(f => {
                if (!f.date) return;
                const anio = parseInt(f.date.substring(0, 4));
                if (!documentosPorAnio[anio]) {
                    documentosPorAnio[anio] = [];
                }

                const facturaName = f.name || `${f.prefix}-${f.number}`;
                const nit = f.customer?.identification || 'N/A';
                const nombreCliente = clientesMap[nit]?.nombre || nit;

                // Obtener información de moneda de la factura
                const fCurrency = f.currency || null;

                let valorBase = 0;
                const conceptoCompleto = (f.items || []).map(i => i.description || i.code).filter(Boolean).join(' | ');
                (f.items || []).forEach(item => {
                    valorBase += (item.price || 0) * (item.quantity || 1);
                });
                // Convertir valor base a COP
                valorBase = convertirACOP(valorBase, fCurrency);

                const llavesPosibles = [facturaName, `FV-2-${f.number}`, `FV-1-${f.number}`, `${f.prefix}-${f.number}`];
                let pagosFactura = [];
                for (const llave of llavesPosibles) {
                    if (pagosPorFactura[llave]) {
                        pagosFactura = pagosPorFactura[llave];
                        break;
                    }
                }

                let notasCreditoFactura = [];
                for (const llave of llavesPosibles) {
                    if (ncPorFactura[llave]) {
                        notasCreditoFactura = ncPorFactura[llave];
                        break;
                    }
                }

                // Convertir balance a COP
                const saldoReportado = convertirACOP(f.balance || 0, fCurrency);

                // Si Siigo ya gestionó la factura (balance=0 o tiene RC/CE), ignorar Google Sheets
                const movimientosMR = (saldoReportado <= 0 || pagosFactura.length > 0) ? [] : (mrPorFactura[f.number] || []);

                const pagosRC = pagosFactura.filter(p => p.movimiento === 'Credit');
                const comprobantesCE = pagosFactura.filter(p => p.movimiento !== 'Credit');
                const totalPagadoRC = pagosRC.reduce((sum, p) => sum + p.valor, 0);
                const totalCE = comprobantesCE.reduce((sum, p) => sum + p.valor, 0);
                const totalNC = notasCreditoFactura.reduce((sum, nc) => sum + nc.total, 0);
                const totalMR = movimientosMR.reduce((sum, mr) => sum + mr.valor, 0);
                let saldoAjustado = Math.max(0, saldoReportado - totalMR);

                // Micro-saldos < $1000 se tratan como pagados
                if (saldoAjustado > 0 && saldoAjustado < 1000) {
                    saldoAjustado = 0;
                }

                // Convertir total de factura a COP para comparación
                const totalFacturaCOP = convertirACOP(f.total || 0, fCurrency);

                let estado = 'pendiente';
                if (totalNC >= totalFacturaCOP * 0.99) {
                    estado = 'anulada';
                } else if (saldoAjustado === 0 && (totalPagadoRC > 0 || totalMR > 0 || totalCE > 0)) {
                    estado = 'pagada';
                } else if (saldoAjustado === 0) {
                    estado = 'saldada';
                } else if (totalNC > 0) {
                    estado = 'nc_parcial';
                }

                documentosPorAnio[anio].push({
                    numero: facturaName,
                    fecha: f.date,
                    cliente: nombreCliente,
                    nit: nit,
                    concepto: conceptoCompleto,
                    valorBase: valorBase,
                    total: totalFacturaCOP,
                    saldo: saldoAjustado,
                    estado: estado,
                    notasCredito: notasCreditoFactura,
                    pagos: pagosRC,
                    comprobantesEgreso: comprobantesCE,
                    movimientosMR: movimientosMR,
                    totalNC: totalNC,
                    totalPagadoRC: totalPagadoRC,
                    totalCE: totalCE,
                    totalMR: totalMR
                });
            });

            const aniosOrdenados = Object.keys(documentosPorAnio).sort((a, b) => b - a);

            html += '<div class="table-scroll-container" style="max-height: 600px;">';

            let totalFacturasGeneral = 0;
            let totalNCGeneral = 0;
            let totalPagadoGeneral = 0;
            let totalMRGeneral = 0;
            let saldoPendienteGeneral = 0;
            let documentosMostrados = 0;

            aniosOrdenados.forEach(anio => {
                let docs = documentosPorAnio[anio];

                // Aplicar filtro de búsqueda si existe
                if (filtroBusqueda) {
                    docs = docs.filter(d =>
                        d.numero.toLowerCase().includes(filtroBusqueda) ||
                        d.cliente.toLowerCase().includes(filtroBusqueda) ||
                        d.nit.toLowerCase().includes(filtroBusqueda) ||
                        d.concepto.toLowerCase().includes(filtroBusqueda)
                    );
                }

                // Aplicar filtro de estado
                if (filtroEstadoTodos === 'pendiente') {
                    docs = docs.filter(d => d.estado === 'pendiente' || d.estado === 'nc_parcial');
                } else if (filtroEstadoTodos === 'mr') {
                    docs = docs.filter(d => d.movimientosMR && d.movimientosMR.length > 0);
                } else if (filtroEstadoTodos === 'pagada') {
                    docs = docs.filter(d => d.estado === 'pagada' || d.estado === 'saldada');
                } else if (filtroEstadoTodos === 'anulada') {
                    docs = docs.filter(d => d.estado === 'anulada');
                }

                if (docs.length === 0) return;

                docs.sort((a, b) => b.fecha.localeCompare(a.fecha));

                const totalFacturasAnio = docs.reduce((sum, f) => sum + f.valorBase, 0);
                const totalNCAnio = docs.reduce((sum, f) => sum + f.totalNC, 0);
                const totalPagadoAnio = docs.reduce((sum, f) => sum + f.totalPagadoRC, 0);
                const totalCEAnio = docs.reduce((sum, f) => sum + (f.totalCE || 0), 0);
                const totalMRAnio = docs.reduce((sum, f) => sum + f.totalMR, 0);
                const saldoAnio = docs.reduce((sum, f) => sum + f.saldo, 0);
                const netoAnio = totalFacturasAnio - totalNCAnio;

                totalFacturasGeneral += totalFacturasAnio;
                totalNCGeneral += totalNCAnio;
                totalPagadoGeneral += totalPagadoAnio;
                totalMRGeneral += totalMRAnio;
                saldoPendienteGeneral += saldoAnio;
                documentosMostrados += docs.length;

                // Determinar si este año está expandido (por defecto contraído)
                const estaExpandido = aniosExpandidosDetalle[anio] === true;

                html += `<div class="detalle-anio-header" style="cursor: pointer; display: flex; align-items: center; justify-content: space-between;" onclick="toggleAnioDetalle('${anio}')">
                    <span>
                        <span id="iconoAnio-${anio}" style="display: inline-block; margin-right: 8px;">${estaExpandido ? '▼' : '▶'}</span>
                        ${anio} - ${docs.length} facturas - Neto: ${formatCurrency(netoAnio)} - Saldo: ${formatCurrency(saldoAnio)}
                    </span>
                    <span style="font-size: 11px; color: var(--gris-medio);">${estaExpandido ? 'Clic para contraer' : 'Clic para expandir'}</span>
                </div>`;

                html += `<div id="contenidoAnio-${anio}" style="display: ${estaExpandido ? 'block' : 'none'};">`;

                html += `<table class="tabla-detalle-cliente">
                    <thead>
                        <tr>
                            <th style="width: 120px;">Factura</th>
                            <th style="width: 90px;">Fecha</th>
                            <th style="min-width: 150px;">Cliente</th>
                            <th style="min-width: 180px;">Concepto</th>
                            <th style="text-align: right; width: 100px;">Total</th>
                            <th style="text-align: right; width: 90px;">N. Crédito</th>
                            <th style="text-align: right; width: 90px;">Pagado RC</th>
                            <th style="text-align: right; width: 90px; color: #7c3aed;">CE</th>
                            <th style="text-align: right; width: 90px; color: #1971c2;">MR</th>
                            <th style="text-align: right; width: 100px;">Saldo</th>
                        </tr>
                    </thead>
                    <tbody>`;

                docs.forEach((f, idx) => {
                    const tieneDetalle = f.notasCredito.length > 0 || f.pagos.length > 0 || (f.comprobantesEgreso && f.comprobantesEgreso.length > 0) || (f.movimientosMR && f.movimientosMR.length > 0);
                    const rowId = `detalle-todos-${anio}-${idx}`;

                    let estadoBadge = '';
                    let saldoClass = f.saldo > 0 ? 'color: #dc2626; font-weight: 600;' : '';
                    if (f.estado === 'anulada') {
                        estadoBadge = '<span style="background: #dc3545; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">ANULADA</span>';
                        saldoClass = '';
                    } else if (f.estado === 'pagada') {
                        estadoBadge = '<span style="background: var(--verde); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">PAGADA</span>';
                        saldoClass = '';
                    } else if (f.estado === 'nc_parcial') {
                        estadoBadge = '<span style="background: var(--teal-principal); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">NC PARCIAL</span>';
                    }

                    const clienteCorto = f.cliente.length > 25 ? f.cliente.substring(0, 25) + '...' : f.cliente;

                    // Concepto truncado con botón "más"
                    const conceptoEscapado = f.concepto.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                    const conceptoCorto = f.concepto.length > 40 ? f.concepto.substring(0, 40).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : conceptoEscapado;
                    const tieneConceptoLargo = f.concepto.length > 40;
                    const conceptoHTML = tieneConceptoLargo
                        ? `<span id="concepto-${rowId}" class="concepto-truncado" data-concepto-completo="${conceptoEscapado}">${conceptoCorto}... <button type="button" class="btn-ver-mas" data-row-id="${rowId}">más</button></span>`
                        : `<span>${conceptoEscapado || '-'}</span>`;

                    html += `
                        <tr class="doc-row ${tieneDetalle ? 'expandible' : ''}"
                            onclick="${tieneDetalle ? `toggleDetalleRow('${rowId}')` : ''}"
                            style="${tieneDetalle ? 'cursor: pointer;' : ''}">
                            <td>
                                ${tieneDetalle ? `<span class="expand-icon" id="expand-${rowId}">▶</span>` : '<span style="width: 16px; display: inline-block;"></span>'}
                                ${f.numero}${estadoBadge}
                            </td>
                            <td>${formatDate(f.fecha)}</td>
                            <td style="max-width: 150px; overflow: hidden;" title="${f.cliente}">${clienteCorto}</td>
                            <td style="max-width: 200px; overflow: hidden;">${conceptoHTML}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(f.total)}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: var(--teal-principal);">${f.totalNC > 0 ? formatCurrency(f.totalNC) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: var(--verde-vibrante);">${f.totalPagadoRC > 0 ? formatCurrency(f.totalPagadoRC) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: #7c3aed;">${f.totalCE > 0 ? formatCurrency(f.totalCE) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: #1971c2;">${f.totalMR > 0 ? formatCurrency(f.totalMR) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; ${saldoClass}">${formatCurrency(f.saldo)}</td>
                        </tr>
                    `;

                    if (tieneDetalle) {
                        html += `<tr class="detalle-subrow-container" id="subrow-${rowId}" style="display: none;">
                            <td colspan="10" style="padding: 0; background: #f8f9fa;">
                                <table style="width: 100%; margin: 0;"><tbody>`;

                        f.notasCredito.forEach(nc => {
                            html += `<tr class="pago-subrow">
                                <td style="padding-left: 40px; color: var(--teal-principal); font-size: 12px;">↳ ${nc.numero}</td>
                                <td style="font-size: 12px;">${formatDate(nc.fecha)}</td>
                                <td colspan="2" style="font-size: 11px; color: var(--gris-medio);">Nota Credito</td>
                                <td style="text-align: right; font-size: 12px; color: var(--teal-principal);">-${formatCurrency(nc.total)}</td>
                                <td colspan="5"></td>
                            </tr>`;
                        });

                        f.pagos.forEach(p => {
                            html += `<tr class="pago-subrow">
                                <td style="padding-left: 40px; color: var(--verde-vibrante); font-size: 12px;">↳ ${p.voucherNumero}</td>
                                <td style="font-size: 12px;">${formatDate(p.voucherFecha)}</td>
                                <td colspan="2" style="font-size: 11px; color: var(--gris-medio);">Recibo de Caja</td>
                                <td></td>
                                <td></td>
                                <td style="text-align: right; font-size: 12px; color: var(--verde-vibrante);">${formatCurrency(p.valor)}</td>
                                <td colspan="3"></td>
                            </tr>`;
                        });

                        (f.comprobantesEgreso || []).forEach(ce => {
                            html += `<tr class="pago-subrow" style="background: #f3f0ff;">
                                <td style="padding-left: 40px; color: #7c3aed; font-size: 12px;">↳ ${ce.voucherNumero}</td>
                                <td style="font-size: 12px;">${formatDate(ce.voucherFecha)}</td>
                                <td colspan="2" style="font-size: 11px; color: #7c3aed;">
                                    <span style="background: #7c3aed; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px;">COMP. EGRESO</span>
                                    ${ce.descripcion ? `<span style="margin-left: 4px; color: var(--gris-medio);">${ce.descripcion.substring(0, 30)}</span>` : ''}
                                </td>
                                <td></td>
                                <td></td>
                                <td></td>
                                <td style="text-align: right; font-size: 12px; color: #7c3aed; font-weight: 600;">${formatCurrency(ce.valor)}</td>
                                <td colspan="2"></td>
                            </tr>`;
                        });

                        (f.movimientosMR || []).forEach(mr => {
                            html += `<tr class="pago-subrow" style="background: #e7f5ff;">
                                <td style="padding-left: 40px; color: #1971c2; font-size: 12px;">↳ MR-${mr.documento}</td>
                                <td style="font-size: 12px;">${formatDate(mr.fecha)}</td>
                                <td colspan="2" style="font-size: 11px; color: #1971c2;">
                                    <span style="background: #1971c2; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px;">PEND. SIIGO</span>
                                </td>
                                <td colspan="4"></td>
                                <td style="text-align: right; font-size: 12px; color: #1971c2; font-weight: 600;">${formatCurrency(mr.valor)}</td>
                                <td></td>
                            </tr>`;
                        });

                        html += `</tbody></table></td></tr>`;
                    }
                });

                html += `<tr class="subtotal-anio-row">
                    <td colspan="4"><strong>Subtotal ${anio}</strong></td>
                    <td style="text-align: right;">${formatCurrency(docs.reduce((s, f) => s + f.total, 0))}</td>
                    <td style="text-align: right; color: var(--teal-principal);">${formatCurrency(totalNCAnio)}</td>
                    <td style="text-align: right; color: var(--verde-vibrante);">${formatCurrency(totalPagadoAnio)}</td>
                    <td style="text-align: right; color: #7c3aed;">${totalCEAnio > 0 ? formatCurrency(totalCEAnio) : '-'}</td>
                    <td style="text-align: right; color: #1971c2;">${totalMRAnio > 0 ? formatCurrency(totalMRAnio) : '-'}</td>
                    <td style="text-align: right;">${formatCurrency(saldoAnio)}</td>
                </tr>`;

                html += `</tbody></table>`;
                html += `</div>`; // Cerrar contenedor del año colapsable
            });

            html += '</div>';

            // Mostrar mensaje si no hay resultados de búsqueda
            if (documentosMostrados === 0 && filtroBusqueda) {
                return html.replace('<div class="table-scroll-container" style="max-height: 600px;"></div>', '') + `
                    <div style="text-align: center; padding: 40px; color: var(--gris-medio);">
                        No se encontraron facturas que coincidan con "${filtroDetalleTodos}"
                    </div>
                `;
            }

            // Resumen total
            const netoGeneral = totalFacturasGeneral - totalNCGeneral;

            html += `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; padding: 16px; background: #f8fafc; border-radius: 8px;">
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Total Facturado</div>
                        <div style="font-size: 18px; font-weight: 700; color: #16a34a;">${formatCurrency(totalFacturasGeneral)}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Notas Crédito</div>
                        <div style="font-size: 18px; font-weight: 700; color: var(--teal-principal);">-${formatCurrency(totalNCGeneral)}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Ventas Netas</div>
                        <div style="font-size: 18px; font-weight: 700; color: var(--azul-principal);">${formatCurrency(netoGeneral)}</div>
                    </div>
                </div>
            `;

            return html;
        }

        // Variable para el filtro de búsqueda en detalle de todos
        let filtroDetalleTodos = '';
        let filtroEstadoTodos = ''; // '', 'pendiente', 'mr', 'pagada', 'anulada'

        // Filtrar detalle de todos (función para el input de búsqueda)
        function filtrarDetalleTodos(valor) {
            filtroDetalleTodos = valor;
            reRenderDetalleTodos();
        }

        function cambiarFiltroEstadoTodos(estado) {
            filtroEstadoTodos = filtroEstadoTodos === estado ? '' : estado;
            reRenderDetalleTodos();
        }

        function reRenderDetalleTodos() {
            const contenedor = document.getElementById('tablaDetalleCliente');
            if (contenedor) {
                contenedor.innerHTML = renderDetalleClienteTodos();
                const input = document.getElementById('searchDetalleTodos');
                if (input) {
                    input.focus();
                    input.setSelectionRange(input.value.length, input.value.length);
                }
            }
        }

        // Variable para el filtro de búsqueda en detalle
        let filtroDetalleCliente = '';
        let filtroEstadoCliente = ''; // '', 'pendiente', 'mr', 'pagada', 'anulada'

        function renderFiltroEstadoBar(filtroActual, onClickFn) {
            const botones = [
                { id: '', label: 'Todas', color: 'var(--gris-oscuro)', bg: '#f1f5f9' },
                { id: 'pendiente', label: 'Pendientes', color: '#dc2626', bg: '#fef2f2' },
                { id: 'mr', label: 'Con MR', color: '#1971c2', bg: '#e7f5ff' },
                { id: 'pagada', label: 'Pagadas', color: 'var(--verde-vibrante)', bg: '#f0fdf4' },
                { id: 'anulada', label: 'Anuladas', color: '#dc3545', bg: '#fef2f2' }
            ];
            return `<div style="display: flex; gap: 6px; flex-wrap: wrap;">
                ${botones.map(b => {
                    const activo = filtroActual === b.id;
                    return `<button onclick="${onClickFn}('${b.id}')" style="
                        padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
                        border: 1.5px solid ${activo ? b.color : '#ddd'};
                        background: ${activo ? b.bg : 'white'};
                        color: ${activo ? b.color : 'var(--gris-medio)'};
                    ">${b.label}</button>`;
                }).join('')}
            </div>`;
        }

        // Renderizar tabla de detalle de facturas y NC por cliente
        function renderDetalleCliente(nit, nombreCliente) {
            // Obtener facturas del cliente, filtradas por año máximo de análisis
            const facturasCliente = facturas.filter(f => {
                const nitFactura = f.customer?.identification || '';
                if (nitFactura !== nit) return false;
                // FILTRO TEMPORAL: Solo mostrar facturas de años <= año de análisis
                if (f.date) {
                    const anio = parseInt(f.date.substring(0, 4));
                    if (anio > anioAnalisisFacturacion) return false;
                }
                return true;
            });

            if (facturasCliente.length === 0) {
                return `<div style="text-align: center; padding: 40px; color: var(--gris-medio);">
                    No hay facturas para este cliente en el período seleccionado (hasta ${anioAnalisisFacturacion})
                </div>`;
            }

            // Construir índice de notas crédito por factura vinculada
            // FILTRO TEMPORAL: Solo NC de años <= año de análisis
            const ncPorFactura = {};
            notasCredito.forEach(nc => {
                if (nc.customer?.identification === nit && nc.invoice?.name) {
                    // Filtrar por año
                    if (nc.date) {
                        const anioNC = parseInt(nc.date.substring(0, 4));
                        if (anioNC > anioAnalisisFacturacion) return;
                    }
                    const facturaKey = nc.invoice.name;
                    if (!ncPorFactura[facturaKey]) {
                        ncPorFactura[facturaKey] = [];
                    }
                    // Obtener concepto de la NC
                    const conceptoNC = (nc.items || []).map(i => i.description || i.code).filter(Boolean).join(', ');
                    // Convertir total de NC a COP si es moneda extranjera
                    const ncCurrency = nc.currency || null;
                    const totalNC = convertirACOP(nc.total || 0, ncCurrency);
                    ncPorFactura[facturaKey].push({
                        numero: nc.name,
                        fecha: nc.date,
                        total: totalNC,
                        concepto: conceptoNC
                    });
                }
            });

            // Construir índice de MR (Movimientos Registrados) por número de factura
            // FILTRO TEMPORAL: Solo MR de años <= año de análisis
            const mrPorFactura = {};
            movimientosConFactura.forEach(mr => {
                if (mr.factura) {
                    // Filtrar por año
                    if (mr.fecha) {
                        const anioMR = parseInt(mr.fecha.substring(0, 4));
                        if (anioMR > anioAnalisisFacturacion) return;
                    }
                    const facturaNum = mr.factura;
                    if (!mrPorFactura[facturaNum]) {
                        mrPorFactura[facturaNum] = [];
                    }
                    mrPorFactura[facturaNum].push({
                        documento: mr.documento || 'MR',
                        fecha: mr.fecha,
                        descripcion: mr.descripcion,
                        valor: mr.valor || 0
                    });
                }
            });

            // Agrupar facturas por año con toda la información
            const documentosPorAnio = {};

            facturasCliente.forEach(f => {
                if (!f.date) return;
                const anio = parseInt(f.date.substring(0, 4));
                if (!documentosPorAnio[anio]) {
                    documentosPorAnio[anio] = [];
                }

                const facturaName = f.name || `${f.prefix}-${f.number}`;

                // Obtener información de moneda de la factura
                const fCurrency = f.currency || null;

                // Calcular valor base
                let valorBase = 0;
                const conceptoCompleto = (f.items || []).map(i => i.description || i.code).filter(Boolean).join(' | ');
                (f.items || []).forEach(item => {
                    valorBase += (item.price || 0) * (item.quantity || 1);
                });
                // Convertir valor base a COP
                valorBase = convertirACOP(valorBase, fCurrency);

                // Buscar pagos (RC) asociados
                const llavesPosibles = [facturaName, `FV-2-${f.number}`, `FV-1-${f.number}`, `${f.prefix}-${f.number}`];
                let pagosFactura = [];
                for (const llave of llavesPosibles) {
                    if (pagosPorFactura[llave]) {
                        pagosFactura = pagosPorFactura[llave];
                        break;
                    }
                }

                // Buscar notas crédito asociadas
                let notasCreditoFactura = [];
                for (const llave of llavesPosibles) {
                    if (ncPorFactura[llave]) {
                        notasCreditoFactura = ncPorFactura[llave];
                        break;
                    }
                }

                // Convertir balance a COP
                const saldoReportado = convertirACOP(f.balance || 0, fCurrency);

                // Si Siigo ya gestionó la factura (balance=0 o tiene RC/CE), ignorar Google Sheets
                const movimientosMR = (saldoReportado <= 0 || pagosFactura.length > 0) ? [] : (mrPorFactura[f.number] || []);

                // Calcular totales
                const pagosRC = pagosFactura.filter(p => p.movimiento === 'Credit');
                const comprobantesCE = pagosFactura.filter(p => p.movimiento !== 'Credit');
                const totalPagadoRC = pagosRC.reduce((sum, p) => sum + p.valor, 0);
                const totalCE = comprobantesCE.reduce((sum, p) => sum + p.valor, 0);
                const totalNC = notasCreditoFactura.reduce((sum, nc) => sum + nc.total, 0);
                const totalMR = movimientosMR.reduce((sum, mr) => sum + mr.valor, 0);
                let saldoAjustado = Math.max(0, saldoReportado - totalMR);

                // Micro-saldos < $1000 se tratan como pagados
                if (saldoAjustado > 0 && saldoAjustado < 1000) {
                    saldoAjustado = 0;
                }

                // Convertir total de factura a COP
                const totalFacturaCOP = convertirACOP(f.total || 0, fCurrency);

                // Determinar estado (considerando MR y CE)
                let estado = 'pendiente';
                if (totalNC >= totalFacturaCOP * 0.99) {
                    estado = 'anulada';
                } else if (saldoAjustado === 0 && (totalPagadoRC > 0 || totalMR > 0 || totalCE > 0)) {
                    estado = 'pagada';
                } else if (saldoAjustado === 0) {
                    estado = 'saldada';
                } else if (totalNC > 0) {
                    estado = 'nc_parcial';
                }

                documentosPorAnio[anio].push({
                    numero: facturaName,
                    fecha: f.date,
                    concepto: conceptoCompleto,
                    valorBase: valorBase,
                    iva: totalFacturaCOP - valorBase,
                    total: totalFacturaCOP,
                    saldo: saldoAjustado,
                    saldoSIIGO: saldoReportado,
                    estado: estado,
                    notasCredito: notasCreditoFactura,
                    pagos: pagosRC,
                    comprobantesEgreso: comprobantesCE,
                    movimientosMR: movimientosMR,
                    totalNC: totalNC,
                    totalPagadoRC: totalPagadoRC,
                    totalCE: totalCE,
                    totalMR: totalMR
                });
            });

            // Ordenar años descendente
            const aniosOrdenados = Object.keys(documentosPorAnio).sort((a, b) => b - a);

            // Filtrar documentos si hay búsqueda activa
            const filtro = filtroDetalleCliente.toLowerCase().trim();

            let html = `
                <div style="margin-bottom: 16px; display: flex; flex-direction: column; gap: 10px;">
                    <input type="text"
                           id="searchDetalleCliente"
                           placeholder="Buscar por numero de factura o concepto..."
                           value="${filtroDetalleCliente}"
                           oninput="filtrarDetalleCliente(this.value)"
                           style="width: 100%; padding: 10px 14px; border: 1px solid var(--gris-claro); border-radius: 6px; font-size: 14px; box-sizing: border-box;">
                    ${renderFiltroEstadoBar(filtroEstadoCliente, 'cambiarFiltroEstadoCliente')}
                </div>
            `;

            html += '<div class="table-scroll-container" style="max-height: 600px;">';

            let totalFacturasGeneral = 0;
            let totalNCGeneral = 0;
            let totalPagadoGeneral = 0;
            let totalMRGeneral = 0;
            let totalCEGeneral = 0;
            let saldoPendienteGeneral = 0;
            let documentosMostrados = 0;

            aniosOrdenados.forEach(anio => {
                let docs = documentosPorAnio[anio];

                // Aplicar filtro de texto si existe
                if (filtro) {
                    docs = docs.filter(d =>
                        d.numero.toLowerCase().includes(filtro) ||
                        d.concepto.toLowerCase().includes(filtro)
                    );
                }

                // Aplicar filtro de estado
                if (filtroEstadoCliente === 'pendiente') {
                    docs = docs.filter(d => d.estado === 'pendiente' || d.estado === 'nc_parcial');
                } else if (filtroEstadoCliente === 'mr') {
                    docs = docs.filter(d => d.movimientosMR && d.movimientosMR.length > 0);
                } else if (filtroEstadoCliente === 'pagada') {
                    docs = docs.filter(d => d.estado === 'pagada' || d.estado === 'saldada');
                } else if (filtroEstadoCliente === 'anulada') {
                    docs = docs.filter(d => d.estado === 'anulada');
                }

                if (docs.length === 0) return;

                // Ordenar por fecha descendente
                docs.sort((a, b) => b.fecha.localeCompare(a.fecha));

                const totalFacturasAnio = docs.reduce((sum, f) => sum + f.valorBase, 0);
                const totalNCAnio = docs.reduce((sum, f) => sum + f.totalNC, 0);
                const totalPagadoAnio = docs.reduce((sum, f) => sum + (f.totalPagadoRC || 0), 0);
                const totalMRAnio = docs.reduce((sum, f) => sum + (f.totalMR || 0), 0);
                const totalCEAnio = docs.reduce((sum, f) => sum + (f.totalCE || 0), 0);
                const saldoAnio = docs.reduce((sum, f) => sum + f.saldo, 0);
                const netoAnio = totalFacturasAnio - totalNCAnio;

                totalFacturasGeneral += totalFacturasAnio;
                totalNCGeneral += totalNCAnio;
                totalPagadoGeneral += totalPagadoAnio;
                totalMRGeneral += totalMRAnio;
                totalCEGeneral += totalCEAnio;
                saldoPendienteGeneral += saldoAnio;
                documentosMostrados += docs.length;

                html += `<div class="detalle-anio-header">${anio} - ${docs.length} facturas - Neto: ${formatCurrency(netoAnio)}</div>`;

                html += `<table class="tabla-detalle-cliente">
                    <thead>
                        <tr>
                            <th style="width: 120px;">Factura</th>
                            <th style="width: 90px;">Fecha</th>
                            <th style="min-width: 180px;">Concepto</th>
                            <th style="text-align: right; width: 100px;">Total</th>
                            <th style="text-align: right; width: 90px;">N. Crédito</th>
                            <th style="text-align: right; width: 90px;">Pagado</th>
                            <th style="text-align: right; width: 90px; color: #7c3aed;">CE</th>
                            <th style="text-align: right; width: 90px; color: #1971c2;">MR</th>
                            <th style="text-align: right; width: 100px;">Saldo</th>
                        </tr>
                    </thead>
                    <tbody>`;

                docs.forEach((f, idx) => {
                    const tieneDetalle = f.notasCredito.length > 0 || f.pagos.length > 0 || (f.comprobantesEgreso && f.comprobantesEgreso.length > 0) || (f.movimientosMR && f.movimientosMR.length > 0);
                    const rowId = `detalle-${anio}-${idx}`;

                    // Badge de estado
                    let estadoBadge = '';
                    let saldoClass = f.saldo > 0 ? 'color: #dc2626; font-weight: 600;' : '';
                    if (f.estado === 'anulada') {
                        estadoBadge = '<span style="background: #dc3545; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">ANULADA</span>';
                        saldoClass = '';
                    } else if (f.estado === 'pagada') {
                        estadoBadge = '<span style="background: var(--verde); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">PAGADA</span>';
                        saldoClass = '';
                    } else if (f.estado === 'nc_parcial') {
                        estadoBadge = '<span style="background: var(--teal-principal); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; margin-left: 6px;">NC PARCIAL</span>';
                    }

                    // Concepto truncado con botón "más"
                    const conceptoEscapado = f.concepto.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                    const conceptoCorto = f.concepto.length > 50 ? f.concepto.substring(0, 50).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : conceptoEscapado;
                    const tieneConceptoLargo = f.concepto.length > 50;
                    const conceptoHTML = tieneConceptoLargo
                        ? `<span id="concepto-${rowId}" class="concepto-truncado" data-concepto-completo="${conceptoEscapado}">${conceptoCorto}... <button type="button" class="btn-ver-mas" data-row-id="${rowId}">más</button></span>`
                        : `<span>${conceptoEscapado || '-'}</span>`;

                    html += `
                        <tr class="doc-row ${tieneDetalle ? 'expandible' : ''}"
                            onclick="${tieneDetalle ? `toggleDetalleRow('${rowId}')` : ''}"
                            style="${tieneDetalle ? 'cursor: pointer;' : ''}">
                            <td>
                                ${tieneDetalle ? `<span class="expand-icon" id="expand-${rowId}">▶</span>` : '<span style="width: 16px; display: inline-block;"></span>'}
                                ${f.numero}${estadoBadge}
                            </td>
                            <td>${formatDate(f.fecha)}</td>
                            <td style="max-width: 250px; overflow: hidden;">${conceptoHTML}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums;">${formatCurrency(f.total)}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: var(--teal-principal);">${f.totalNC > 0 ? formatCurrency(f.totalNC) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: var(--verde-vibrante);">${f.totalPagadoRC > 0 ? formatCurrency(f.totalPagadoRC) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: #7c3aed;">${f.totalCE > 0 ? formatCurrency(f.totalCE) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; color: #1971c2;">${f.totalMR > 0 ? formatCurrency(f.totalMR) : '-'}</td>
                            <td style="text-align: right; font-variant-numeric: tabular-nums; ${saldoClass}">${formatCurrency(f.saldo)}</td>
                        </tr>
                    `;

                    // Fila expandible con NC, RC y MR
                    if (tieneDetalle) {
                        html += `<tr class="detalle-subrow-container" id="subrow-${rowId}" style="display: none;">
                            <td colspan="9" style="padding: 0; background: #f8f9fa;">
                                <table style="width: 100%; margin: 0;">
                                    <tbody>`;

                        // Notas crédito
                        f.notasCredito.forEach(nc => {
                            const ncConceptoCorto = nc.concepto && nc.concepto.length > 40 ? nc.concepto.substring(0, 40) + '...' : (nc.concepto || '-');
                            html += `
                                <tr class="pago-subrow">
                                    <td style="padding-left: 40px; color: var(--teal-principal); font-size: 12px; width: 120px;">↳ ${nc.numero}</td>
                                    <td style="font-size: 12px; width: 90px;">${formatDate(nc.fecha)}</td>
                                    <td style="font-size: 11px; color: var(--gris-medio);" title="${nc.concepto || ''}">${ncConceptoCorto}</td>
                                    <td style="text-align: right; font-size: 12px; color: var(--teal-principal); width: 100px;">-${formatCurrency(nc.total)}</td>
                                    <td colspan="5"></td>
                                </tr>
                            `;
                        });

                        // Pagos (RC)
                        f.pagos.forEach(p => {
                            html += `
                                <tr class="pago-subrow">
                                    <td style="padding-left: 40px; color: var(--verde-vibrante); font-size: 12px; width: 120px;">↳ ${p.voucherNumero}</td>
                                    <td style="font-size: 12px; width: 90px;">${formatDate(p.voucherFecha)}</td>
                                    <td style="font-size: 11px; color: var(--gris-medio);">Recibo de Caja</td>
                                    <td></td>
                                    <td></td>
                                    <td style="text-align: right; font-size: 12px; color: var(--verde-vibrante); width: 90px;">${formatCurrency(p.valor)}</td>
                                    <td colspan="3"></td>
                                </tr>
                            `;
                        });

                        // Comprobantes de Egreso (CE)
                        (f.comprobantesEgreso || []).forEach(ce => {
                            html += `
                                <tr class="pago-subrow" style="background: #f3f0ff;">
                                    <td style="padding-left: 40px; color: #7c3aed; font-size: 12px; width: 120px;">↳ ${ce.voucherNumero}</td>
                                    <td style="font-size: 12px; width: 90px;">${formatDate(ce.voucherFecha)}</td>
                                    <td style="font-size: 11px; color: #7c3aed;">
                                        <span style="background: #7c3aed; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px;">COMP. EGRESO</span>
                                    </td>
                                    <td colspan="2"></td>
                                    <td></td>
                                    <td style="text-align: right; font-size: 12px; color: #7c3aed; font-weight: 600; width: 90px;">${formatCurrency(ce.valor)}</td>
                                    <td colspan="2"></td>
                                </tr>
                            `;
                        });

                        // Movimientos Registrados (MR) - Pagos pendientes de cargar a SIIGO
                        (f.movimientosMR || []).forEach(mr => {
                            html += `
                                <tr class="pago-subrow" style="background: #e7f5ff;">
                                    <td style="padding-left: 40px; color: #1971c2; font-size: 12px; width: 120px;">↳ MR-${mr.documento}</td>
                                    <td style="font-size: 12px; width: 90px;">${formatDate(mr.fecha)}</td>
                                    <td style="font-size: 11px; color: #1971c2;" title="${mr.descripcion || ''}">
                                        <span style="background: #1971c2; color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px;">PEND. SIIGO</span>
                                    </td>
                                    <td colspan="3"></td>
                                    <td></td>
                                    <td style="text-align: right; font-size: 12px; color: #1971c2; font-weight: 600; width: 90px;">${formatCurrency(mr.valor)}</td>
                                    <td></td>
                                </tr>
                            `;
                        });

                        html += `</tbody></table></td></tr>`;
                    }
                });

                // Subtotal del año (totalMRAnio ya calculado arriba)
                html += `<tr class="subtotal-anio-row">
                    <td colspan="3"><strong>Subtotal ${anio}</strong></td>
                    <td style="text-align: right;">${formatCurrency(docs.reduce((s, f) => s + f.total, 0))}</td>
                    <td style="text-align: right; color: var(--teal-principal);">${formatCurrency(totalNCAnio)}</td>
                    <td style="text-align: right; color: var(--verde-vibrante);">${formatCurrency(docs.reduce((s, f) => s + f.totalPagadoRC, 0))}</td>
                    <td style="text-align: right; color: #7c3aed;">${totalCEAnio > 0 ? formatCurrency(totalCEAnio) : '-'}</td>
                    <td style="text-align: right; color: #1971c2;">${totalMRAnio > 0 ? formatCurrency(totalMRAnio) : '-'}</td>
                    <td style="text-align: right;">${formatCurrency(saldoAnio)}</td>
                </tr>`;

                html += `</tbody></table>`;
            });

            html += '</div>';

            // Mostrar mensaje si no hay resultados
            if (documentosMostrados === 0 && filtro) {
                html = `
                    <div class="detalle-search-container" style="margin-bottom: 16px;">
                        <input type="text"
                               id="searchDetalleCliente"
                               placeholder="Buscar por número de factura o concepto..."
                               value="${filtroDetalleCliente}"
                               oninput="filtrarDetalleCliente(this.value)"
                               style="width: 100%; padding: 10px 14px; border: 1px solid var(--gris-claro); border-radius: 6px; font-size: 14px;">
                    </div>
                    <div style="text-align: center; padding: 40px; color: var(--gris-medio);">
                        No se encontraron facturas que coincidan con "${filtroDetalleCliente}"
                    </div>
                `;
                return html;
            }

            // Resumen total del cliente
            const netoGeneral = totalFacturasGeneral - totalNCGeneral;

            html += `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 16px; padding: 16px; background: #f8fafc; border-radius: 8px;">
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Total Facturado</div>
                        <div style="font-size: 18px; font-weight: 700; color: #16a34a;">${formatCurrency(totalFacturasGeneral)}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Notas Crédito</div>
                        <div style="font-size: 18px; font-weight: 700; color: var(--teal-principal);">-${formatCurrency(totalNCGeneral)}</div>
                    </div>
                    <div style="text-align: center;">
                        <div style="font-size: 12px; color: var(--gris-medio); text-transform: uppercase;">Ventas Netas</div>
                        <div style="font-size: 18px; font-weight: 700; color: var(--azul-principal);">${formatCurrency(netoGeneral)}</div>
                    </div>
                </div>
            `;

            return html;
        }

        // Filtrar detalle de cliente
        function filtrarDetalleCliente(valor) {
            filtroDetalleCliente = valor;
            reRenderDetalleCliente();
        }

        function cambiarFiltroEstadoCliente(estado) {
            filtroEstadoCliente = filtroEstadoCliente === estado ? '' : estado;
            reRenderDetalleCliente();
        }

        function reRenderDetalleCliente() {
            if (clienteSeleccionadoTabla) {
                const row = document.querySelector(`.cliente-row[data-nit="${clienteSeleccionadoTabla}"]`);
                if (row) {
                    const nombre = row.getAttribute('data-nombre').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
                    const contenedor = document.getElementById('tablaDetalleCliente');
                    if (contenedor) {
                        contenedor.innerHTML = renderDetalleCliente(clienteSeleccionadoTabla, nombre);
                        const input = document.getElementById('searchDetalleCliente');
                        if (input) {
                            input.focus();
                            input.setSelectionRange(input.value.length, input.value.length);
                        }
                    }
                }
            }
        }

        // Toggle para expandir/colapsar detalle de factura
        function toggleDetalleRow(rowId) {
            const subrow = document.getElementById(`subrow-${rowId}`);
            const expandIcon = document.getElementById(`expand-${rowId}`);
            if (subrow) {
                const isVisible = subrow.style.display !== 'none';
                subrow.style.display = isVisible ? 'none' : 'table-row';
                if (expandIcon) {
                    expandIcon.textContent = isVisible ? '▶' : '▼';
                }
            }
        }

        // Toggle para mostrar/ocultar concepto completo
        function toggleConcepto(rowId) {
            const span = document.getElementById(`concepto-${rowId}`);
            if (span) {
                const conceptoCompleto = span.getAttribute('data-concepto-completo') || '';
                const isExpanded = span.classList.contains('concepto-expandido');
                if (isExpanded) {
                    const conceptoCorto = conceptoCompleto.substring(0, 50);
                    span.innerHTML = `${conceptoCorto}... <button type="button" class="btn-ver-mas" data-row-id="${rowId}">más</button>`;
                    span.classList.remove('concepto-expandido');
                    span.classList.add('concepto-truncado');
                } else {
                    span.innerHTML = `${conceptoCompleto} <button type="button" class="btn-ver-mas" data-row-id="${rowId}">menos</button>`;
                    span.classList.remove('concepto-truncado');
                    span.classList.add('concepto-expandido');
                }
            }
        }

        // Event listener delegado para botones "más/menos"
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('btn-ver-mas')) {
                e.stopPropagation();
                e.preventDefault();
                const rowId = e.target.getAttribute('data-row-id');
                if (rowId) {
                    toggleConcepto(rowId);
                }
            }
        });

        function calcularKPIs(facturasProcessed) {
            const carteraPendiente = facturasProcessed.reduce((sum, f) => sum + f.balance, 0);
            const facturasVencidas = facturasProcessed.filter(f => f.esProblematica).length;
            const clientesUnicos = new Set(facturasProcessed.map(f => f.clienteNit)).size;

            const carteraPorHorizonte = {
                '0-30': 0, '31-60': 0, '61-90': 0, '91-120': 0, '>120': 0
            };
            facturasProcessed.forEach(f => {
                carteraPorHorizonte[f.horizonte] += f.balance;
            });

            const carteraPorCliente = {};
            facturasProcessed.forEach(f => {
                const key = f.clienteNit;
                if (!carteraPorCliente[key]) {
                    carteraPorCliente[key] = { nit: key, nombre: f.clienteNombre, total: 0 };
                }
                carteraPorCliente[key].total += f.balance;
            });
            const topClientes = Object.values(carteraPorCliente)
                .sort((a, b) => b.total - a.total)
                .slice(0, 10);

            const carteraPorLinea = {};
            facturasProcessed.forEach(f => {
                const linea = f.lineaNegocio;
                carteraPorLinea[linea] = (carteraPorLinea[linea] || 0) + f.balance;
            });

            const facturasProblematicas = facturasProcessed
                .filter(f => f.esProblematica)
                .sort((a, b) => b.dias - a.dias)
                .slice(0, 20);

            // Filtrar movimientos por cliente si hay filtro activo
            let mrFiltrados = movimientosConFactura;
            let sinIdFiltrados = movimientosSinIdentificar;
            let limboFiltrados = movimientosEnLimbo;

            if (filtros.cliente) {
                // MR: filtrar por cliente de la factura
                mrFiltrados = movimientosConFactura.filter(m => {
                    if (m.clienteEncontrado?.nit === filtros.cliente) return true;
                    if (m.facturasEncontradas?.some(f => f.clienteNit === filtros.cliente)) return true;
                    return false;
                });
                // Sin Identificar: filtrar por NIT del movimiento
                sinIdFiltrados = movimientosSinIdentificar.filter(m => m.nit === filtros.cliente);
                // Limbo: siempre 0 cuando hay filtro de cliente (no tienen cliente identificado)
                limboFiltrados = [];
            }

            const valorMRFiltrado = mrFiltrados.reduce((sum, m) => sum + (m.valor || 0), 0);
            const valorSinIdFiltrado = sinIdFiltrados.reduce((sum, m) => sum + (m.valor || 0), 0);
            const valorLimboFiltrado = limboFiltrados.reduce((sum, m) => sum + (m.valor || 0), 0);

            // Calcular Cartera Real (ajustada por movimientos bancarios filtrados)
            const carteraReal = carteraPendiente
                - valorMRFiltrado          // MR: ya pagadas
                - valorSinIdFiltrado       // DSI: pagos de clientes sin cruzar
                - valorLimboFiltrado;      // Limbo: pagos sin identificar (0 si hay filtro cliente)

            return {
                carteraPendiente,
                carteraReal,
                facturasVencidas,
                clientesUnicos,
                totalFacturas: facturasProcessed.length,
                carteraPorHorizonte,
                topClientes,
                carteraPorLinea,

                // KPIs de movimientos bancarios (filtrados por cliente si aplica)
                movimientos: {

        function renderVistaGraficos(kpis, ventasPorMesAnio, ventasYTD) {
            // Determinar el año y mes para filtrar ventas
            const anioFiltro = filtros.cierreAnio ? parseInt(filtros.cierreAnio) : new Date().getFullYear();
            const mesFiltro = filtros.cierreMes ? parseInt(filtros.cierreMes) : null;

            // Calcular venta total del año/mes seleccionado
            let ventasFiltradas = 0;
            let ncFiltradas = 0;
            let numFacturasFiltradas = 0;
            let numNCFiltradas = 0;

            facturas.forEach(f => {
                if (!f.date) return;
                const fechaFactura = new Date(f.date);
                const anioFactura = fechaFactura.getFullYear();
                const mesFactura = fechaFactura.getMonth() + 1;

                if (anioFactura === anioFiltro) {
                    if (!mesFiltro || mesFactura <= mesFiltro) {
                        // Convertir a COP si es moneda extranjera
                        const fCurrency = f.currency || null;
                        ventasFiltradas += convertirACOP(f.total || 0, fCurrency);
                        numFacturasFiltradas++;
                    }
                }
            });

            notasCredito.forEach(nc => {
                if (!nc.date) return;
                const fechaNC = new Date(nc.date);
                const anioNC = fechaNC.getFullYear();
                const mesNC = fechaNC.getMonth() + 1;

                if (anioNC === anioFiltro) {
                    if (!mesFiltro || mesNC <= mesFiltro) {
                        // Convertir a COP si es moneda extranjera
                        const ncCurrency = nc.currency || null;
                        ncFiltradas += convertirACOP(nc.total || 0, ncCurrency);
                        numNCFiltradas++;
                    }
                }
            });

            const ventaNetaFiltrada = ventasFiltradas - ncFiltradas;
            const etiquetaPeriodo = mesFiltro
                ? `${MESES[mesFiltro - 1]} ${anioFiltro}`
                : `Año ${anioFiltro}`;

            // Calcular cartera crítica según horizonte seleccionado
            let carteraCritica = 0;
            let facturasCriticas = 0;
            if (horizonteCritico === 60) {
                carteraCritica = kpis.carteraPorHorizonte['61-90'] + kpis.carteraPorHorizonte['91-120'] + kpis.carteraPorHorizonte['>120'];
                facturasCriticas = facturasProcessed.filter(f => f.dias > 60).length;
            } else if (horizonteCritico === 90) {
                carteraCritica = kpis.carteraPorHorizonte['91-120'] + kpis.carteraPorHorizonte['>120'];
                facturasCriticas = facturasProcessed.filter(f => f.dias > 90).length;
            } else {
                carteraCritica = kpis.carteraPorHorizonte['>120'];
                facturasCriticas = facturasProcessed.filter(f => f.dias > 120).length;

            // Calcular conteo de facturas por horizonte
            const facturasPorHorizonte = {
                'porVencer': facturasProcessed.filter(f => f.dias < 0).length,
                '0-30': facturasProcessed.filter(f => f.horizonte === '0-30').length,
                '31-60': facturasProcessed.filter(f => f.horizonte === '31-60').length,
                '61-90': facturasProcessed.filter(f => f.horizonte === '61-90').length,
                '91-120': facturasProcessed.filter(f => f.horizonte === '91-120').length,
                '>120': facturasProcessed.filter(f => f.horizonte === '>120').length
            };

            // Calcular saldo por vencer (facturas con días negativos o balance con due_date futuro)
            const saldoPorVencer = facturasProcessed
                .filter(f => f.dias < 0)
                .reduce((sum, f) => sum + f.balance, 0);

            // Inicializar años disponibles si no se ha hecho
            if (aniosDisponiblesVentas.length === 0) {
                inicializarAniosSeleccionados();
            }

            // Filtrar datos de gráficas hasta el mes de cierre si está seleccionado
            let ventasFiltradoMes = {};
            let ventasYTDFiltrado = {};

            // Usar años seleccionados para los gráficos
            aniosSeleccionadosGraficos.forEach(anio => {
                ventasFiltradoMes[anio] = {};
                ventasYTDFiltrado[anio] = {};
                let acumulado = 0;

                for (let mes = 1; mes <= 12; mes++) {
                    const valorMes = ventasPorMesAnio[anio]?.[mes]?.neto || 0;

                    // Para el año de filtro, solo mostrar hasta el mes seleccionado
                    if (anio === anioFiltro && mesFiltro && mes > mesFiltro) {
                        ventasFiltradoMes[anio][mes] = { neto: 0, ventas: 0, nc: 0 };
                        ventasYTDFiltrado[anio][mes] = acumulado; // Mantener el acumulado hasta ese punto
                    } else {
                        ventasFiltradoMes[anio][mes] = ventasPorMesAnio[anio]?.[mes] || { neto: 0, ventas: 0, nc: 0 };
                        acumulado += valorMes;
                        ventasYTDFiltrado[anio][mes] = acumulado;
                    }

                                <option value="120" ${horizonteCritico === 120 ? 'selected' : ''}>+120 días</option>
                            </select>
                        </div>
                        <div class="kpi-value danger">${formatCurrency(carteraCritica)}</div>
                        <div class="kpi-subtitle">${facturasCriticas} facturas | Mayor riesgo de incobrabilidad</div>
                    </div>
                </div>

                <!-- KPIs Movimientos Bancarios (si hay datos) -->
                ${kpis.movimientos && kpis.movimientos.total > 0 ? `
                <div class="kpi-grid" style="grid-template-columns: repeat(4, 1fr); margin-top: 16px;">
                    <div class="kpi-card" style="border-left: 4px solid var(--verde-vibrante);">
                        <div class="kpi-label">Cartera Real</div>
                        <div class="kpi-value" style="color: var(--verde-vibrante);">${formatCurrency(kpis.carteraReal)}</div>

                    </div>
                    <div class="kpi-card" style="border-left: 4px solid var(--amarillo); ${kpis.movimientos.sinIdentificar.cantidad > 0 ? 'cursor: pointer; transition: box-shadow 0.2s;' : ''}" ${kpis.movimientos.sinIdentificar.cantidad > 0 ? `onclick="mostrarDetalleSinIdentificar()" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow=''"` : ''}>

                        ${kpis.movimientos.sinIdentificar.cantidad > 0 ? `<div style="text-align: right; margin-top: 4px; font-size: 11px; color: #b45309;">Ver detalle &#8250;</div>` : ''}
                    </div>
                    <div class="kpi-card" style="border-left: 4px solid var(--rojo); ${kpis.movimientos.alertasNIT > 0 ? 'cursor: pointer; transition: box-shadow 0.2s;' : ''}" ${kpis.movimientos.alertasNIT > 0 ? `onclick="mostrarAlertasNIT()" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,0.12)'" onmouseout="this.style.boxShadow=''"` : ''}>
                        <div class="kpi-label">Pendiente por Identificar Cliente</div>
                        <div class="kpi-value" style="color: var(--rojo);">${formatCurrency(kpis.movimientos.enLimbo.valor)}</div>
                        <div class="kpi-subtitle">${kpis.movimientos.enLimbo.cantidad} pagos | Sin cliente identificado</div>
                        ${kpis.movimientos.alertasNIT > 0 ? `<div style="text-align: right; margin-top: 4px; font-size: 11px; color: var(--rojo);">${kpis.movimientos.alertasNIT} NITs no encontrados &#8250;</div>` : ''}
                    </div>
                </div>
                ` : ''}

                <!-- Selector de Años para Gráficos -->
                <div class="section" style="padding: 16px 20px; background: white; border-radius: 8px; margin-bottom: 16px;">
                    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;">
                        <div style="font-weight: 600; color: var(--gris-oscuro);">Años a comparar en gráficos:</div>
                        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
                            ${aniosDisponiblesVentas.map(anio => `
                                <button
                                    onclick="toggleAnioGrafico(${anio})"
                                    style="
                                        padding: 6px 14px;
                                        border-radius: 6px;
                                        border: 2px solid ${aniosSeleccionadosGraficos.includes(anio) ? 'var(--teal-principal)' : 'var(--gris-claro)'};
                                        background: ${aniosSeleccionadosGraficos.includes(anio) ? 'var(--teal-principal)' : 'white'};
                                        color: ${aniosSeleccionadosGraficos.includes(anio) ? 'white' : 'var(--gris-oscuro)'};
                                        font-weight: 600;
                                        font-size: 13px;
                                        cursor: pointer;
                                        transition: all 0.2s;
                                    "
                                >${anio}</button>
                            `).join('')}
                        </div>
                        <div style="font-size: 12px; color: var(--gris-medio);">

                <!-- Gráfico de Ventas Mensuales -->

        // Vista de Análisis por Año - Replica el reporte "Ventas por cliente" de Siigo
        function renderVistaConciliacion() {
            // Calcular ventas por mes para el año seleccionado
            const ventasMensualesAnio = calcularVentasMensualesConciliacion();

            // Obtener el período seleccionado o usar el mes actual
            let periodoInicio, periodoFin, periodoLabel, mesSeleccionado;

            if (filtros.cierreAnio && filtros.cierreMes) {
                const anio = parseInt(filtros.cierreAnio);
                const mes = parseInt(filtros.cierreMes);
                mesSeleccionado = mes;
                periodoInicio = `${anio}-${String(mes).padStart(2, '0')}-01`;
                const ultimoDia = new Date(anio, mes, 0).getDate();
                periodoFin = `${anio}-${String(mes).padStart(2, '0')}-${ultimoDia}`;
                periodoLabel = `${MESES[mes - 1]} ${anio}`;
            } else {
                const mes = new Date().getMonth() + 1;
                mesSeleccionado = mes;
                periodoInicio = `${anioAnalisis}-${String(mes).padStart(2, '0')}-01`;
                const ultimoDia = new Date(anioAnalisis, mes, 0).getDate();
                periodoFin = `${anioAnalisis}-${String(mes).padStart(2, '0')}-${ultimoDia}`;
                periodoLabel = `${MESES[mes - 1]} ${anioAnalisis}`;
            }

            // Filtrar facturas del período (usando datos originales de la API)
            const facturasDelPeriodo = facturas.filter(f => {
                if (!f.date) return false;
                const fechaFactura = f.date;

                // Aplicar filtros de cliente y centro de costos si están activos
                if (filtros.cliente) {
                    const nitFactura = f.customer?.identification || '';
                    if (nitFactura !== filtros.cliente) return false;
                }
                if (filtros.lineaNegocio) {
                    const lineaFactura = LINEAS_NEGOCIO[f.cost_center] || 'Sin asignar';
                    if (lineaFactura !== filtros.lineaNegocio) return false;
                }

                return fechaFactura >= periodoInicio && fechaFactura <= periodoFin;
            });

            // Filtrar notas crédito del período
            const notasCreditoDelPeriodo = notasCredito.filter(nc => {
                if (!nc.date) return false;
                const fechaNC = nc.date;

                // Aplicar filtros de cliente y centro de costos si están activos
                if (filtros.cliente) {
                    const nitNC = nc.customer?.identification || '';
                    if (nitNC !== filtros.cliente) return false;

                    if (lineaNC !== filtros.lineaNegocio) return false;
                }

                return fechaNC >= periodoInicio && fechaNC <= periodoFin;

            // Agrupar por cliente y calcular totales (replicando estructura de Siigo)
            const ventasPorCliente = {};

            facturasDelPeriodo.forEach(f => {
                const nit = f.customer?.identification || 'N/A';
                const clienteInfo = clientesMap[nit] || { nombre: nit };

                    ventasPorCliente[nit] = {
                        nit: nit,
                        nombre: clienteInfo.nombre,
                        numFacturas: 0,
                        numNC: 0,
                        valorBrutoFacturas: 0,
                        valorBrutoNC: 0,
                        valorBruto: 0,
                        descuentosItem: 0,
                        subtotal: 0,
                        impuestoCargo: 0,       // IVA
                        impuestoRetencion: 0,   // Retenciones
                        cargoTotales: 0,
                        descuentoTotales: 0,
                        total: 0
                    };
                }

                const cliente = ventasPorCliente[nit];
                cliente.numFacturas += 1;

                // Procesar items de la factura
                (f.items || []).forEach(item => {
                    const precio = item.price || 0;
                    const cantidad = item.quantity || 1;

                        }

                    // Total = valorBase + IVA - Retenciones (coincide con SIIGO)
                    cliente.total += valorItem + (item.taxes || []).reduce((sum, tax) => {
                        if (tax.type === 'IVA') return sum + (tax.value || 0);
                        return sum;
                    }, 0);
                });

                // También agregar retenciones a nivel de factura

        // ============================================
        // VISTA DE DIAGNÓSTICO - Inconsistencias SIIGO
        // ============================================
        function renderVistaDiagnostico() {
            const hoy = new Date();
            const fechaReporte = hoy.toLocaleDateString('es-CO', {
                year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit'
            });

            // ========== ANÁLISIS 1: Balance > Total ==========
            const inconsistenciasBalanceTotal = [];
            facturas.forEach(f => {
                const total = f.total || 0;
                const balance = f.balance || 0;
                if (balance > total && total > 0) {
                    const ratio = balance / total;
                    const moneda = f.currency?.code || 'COP';
                    const tasa = f.currency?.exchange_rate || 1;
                    inconsistenciasBalanceTotal.push({
                        tipo: 'Balance > Total',
                        numero: `${f.prefix}-${f.number}`,
                        fecha: f.date,
                        cliente: f.customer?.identification || 'N/A',
                        clienteNombre: clientesMap[f.customer?.identification]?.nombre || f.customer?.name || 'N/A',
                        moneda: moneda,
                        tasaCambio: tasa,
                        total: total,
                        balance: balance,
                        diferencia: balance - total,
                        ratio: ratio,
                        impactoCOP: moneda !== 'COP' ? (balance - total) * tasa : (balance - total),
                        observacion: `Balance es ${ratio.toFixed(1)}x mayor que el total`
                    });
                }
            });

            // ========== ANÁLISIS 2: Facturas en USD con balances sospechosos ==========
            const facturasUSDSospechosas = [];
            facturas.forEach(f => {
                const moneda = f.currency?.code;
                if (moneda && moneda !== 'COP') {
                    const total = f.total || 0;
                    const balance = f.balance || 0;
                    const tasa = f.currency?.exchange_rate || 1;
                    const balanceCOP = balance * tasa;

                    // Sospechoso si: balance > 0 y (balance > total * 1.5 o balanceCOP > 1000 millones)
                    if (balance > 0 && (balance > total * 1.5 || balanceCOP > 1000000000)) {
                        facturasUSDSospechosas.push({
                            numero: `${f.prefix}-${f.number}`,
                            fecha: f.date,
                            cliente: f.customer?.identification || 'N/A',
                            clienteNombre: clientesMap[f.customer?.identification]?.nombre || f.customer?.name || 'N/A',
                            moneda: moneda,
                            tasaCambio: tasa,
                            totalUSD: total,
                            balanceUSD: balance,
                            totalCOP: total * tasa,
                            balanceCOP: balanceCOP,
                            problema: balance > total ? 'Balance > Total' : 'Balance muy alto'
                        });
                    }
                }
            });

            // ========== ANÁLISIS 3: Notas crédito con balance pendiente alto ==========
            const ncSospechosas = [];
            notasCredito.forEach(nc => {
                const balance = nc.balance || 0;
                const total = nc.total || 0;
                if (balance > total && total > 0) {
                    ncSospechosas.push({
                        numero: `${nc.prefix}-${nc.number}`,
                        fecha: nc.date,
                        cliente: nc.customer?.identification || 'N/A',
                        clienteNombre: clientesMap[nc.customer?.identification]?.nombre || nc.customer?.name || 'N/A',
                        total: total,
                        balance: balance,
                        diferencia: balance - total
                    });
                }
            });

            // ========== ANÁLISIS 4: Facturas muy antiguas con saldo ==========
            const facturasAntiguas = [];
            const dosAniosAtras = new Date();
            dosAniosAtras.setFullYear(dosAniosAtras.getFullYear() - 2);
            facturas.forEach(f => {
                const fechaFactura = new Date(f.date);
                const balance = f.balance || 0;
                if (balance > 0 && fechaFactura < dosAniosAtras) {
                    const diasAntiguedad = Math.floor((hoy - fechaFactura) / (1000 * 60 * 60 * 24));
                    const moneda = f.currency?.code || 'COP';
                    const tasa = f.currency?.exchange_rate || 1;
                    facturasAntiguas.push({
                        numero: `${f.prefix}-${f.number}`,
                        fecha: f.date,
                        cliente: f.customer?.identification || 'N/A',
                        clienteNombre: clientesMap[f.customer?.identification]?.nombre || f.customer?.name || 'N/A',
                        moneda: moneda,
                        balance: balance,
                        balanceCOP: moneda !== 'COP' ? balance * tasa : balance,
                        diasAntiguedad: diasAntiguedad
                    });
                }
            });
            facturasAntiguas.sort((a, b) => b.diasAntiguedad - a.diasAntiguedad);
