        function filtrarClientes(texto) {
            const dropdown = document.getElementById('clienteDropdown');
            const opciones = dropdown.querySelectorAll('.search-select-option');
            const textoLower = texto.toLowerCase().trim();
            let hayResultados = false;

            opciones.forEach((opt, index) => {
                // La primera opción es "Todos los clientes"
                if (index === 0) {
                    opt.style.display = textoLower === '' ? 'block' : 'none';
                    return;
                }

                const nombre = opt.getAttribute('data-nombre') || opt.textContent;
                if (nombre.toLowerCase().includes(textoLower)) {
                    opt.style.display = 'block';
                    hayResultados = true;
                } else {
                    opt.style.display = 'none';
                }
            });

            // Mostrar mensaje si no hay resultados
            let noResultsMsg = dropdown.querySelector('.no-results');
            if (!hayResultados && textoLower !== '') {
                if (!noResultsMsg) {
                    noResultsMsg = document.createElement('div');
                    noResultsMsg.className = 'search-select-option no-results';
                    noResultsMsg.textContent = 'No se encontraron clientes';
                    dropdown.appendChild(noResultsMsg);
                }
                noResultsMsg.style.display = 'block';
            } else if (noResultsMsg) {
                noResultsMsg.style.display = 'none';
            }

            dropdown.classList.add('open');
        }

                updateProgress(100, 'Listo!');

        const chartTooltip = document.getElementById('chartTooltip');

        function showChartTooltip(e, text) {
            chartTooltip.textContent = text;
            chartTooltip.classList.add('visible');
            updateTooltipPosition(e);
        }

        function hideChartTooltip() {
            chartTooltip.classList.remove('visible');
        }

        function updateTooltipPosition(e) {
            const x = e.clientX;
            const y = e.clientY;
            const tooltipWidth = chartTooltip.offsetWidth;
            const tooltipHeight = chartTooltip.offsetHeight;

            // Posicionar arriba del cursor, centrado
            let left = x - tooltipWidth / 2;
            let top = y - tooltipHeight - 15;

            // Ajustar si se sale de la pantalla
            if (left < 10) left = 10;
            if (left + tooltipWidth > window.innerWidth - 10) {
                left = window.innerWidth - tooltipWidth - 10;
            }
            if (top < 10) top = y + 20; // Mostrar abajo si no hay espacio arriba

            chartTooltip.style.left = left + 'px';
            chartTooltip.style.top = top + 'px';
        }

        // Event delegation para barras de gráficos (incluye .chart-bar y .conciliacion-bar)
        document.addEventListener('mouseover', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar && bar.dataset.tooltip) {
                showChartTooltip(e, bar.dataset.tooltip);
            }
        });

        document.addEventListener('mousemove', function(e) {
            if (chartTooltip.classList.contains('visible')) {
                updateTooltipPosition(e);
            }
        });

        document.addEventListener('mouseout', function(e) {
            const bar = e.target.closest('.chart-bar, .conciliacion-bar');
            if (bar) {
                hideChartTooltip();
            }
        });

                const periodoInicio = `${anioAnalisis}-${String(mesSeleccionado).padStart(2, '0')}-01`;
                const ultimoDia = new Date(anioAnalisis, mesSeleccionado, 0).getDate();
                const periodoFin = `${anioAnalisis}-${String(mesSeleccionado).padStart(2, '0')}-${ultimoDia}`;

                // Filtrar facturas y NC del período
                const facturasDelPeriodo = facturas.filter(f => {
                    if (!f.date) return false;
                    if (filtros.cliente) {
                        if ((f.customer?.identification || '') !== filtros.cliente) return false;
                    }
                    return f.date >= periodoInicio && f.date <= periodoFin;
                });

                const notasCreditoDelPeriodo = notasCredito.filter(nc => {
                    if (!nc.date) return false;
                    if (filtros.cliente) {
                        if ((nc.customer?.identification || '') !== filtros.cliente) return false;
                    }
                    return nc.date >= periodoInicio && nc.date <= periodoFin;
                });

                // Calcular ventas por cliente (neto)
                const ventasPorCliente = {};
                facturasDelPeriodo.forEach(f => {
                    const nit = f.customer?.identification || 'N/A';
                    const clienteInfo = clientesMap[nit] || { nombre: nit };
                    if (!ventasPorCliente[nit]) {
                        ventasPorCliente[nit] = { nit, nombre: clienteInfo.nombre, facturas: 0, nc: 0, valorBruto: 0, total: 0 };
                    }
                    ventasPorCliente[nit].facturas += 1;
                    let valorFactura = 0;
                    (f.items || []).forEach(item => {
                        valorFactura += (item.price || 0) * (item.quantity || 1);
                    });
                    ventasPorCliente[nit].valorBruto += valorFactura;
                    ventasPorCliente[nit].total += valorFactura;
                });

                notasCreditoDelPeriodo.forEach(nc => {
                    const nit = nc.customer?.identification || 'N/A';
                    const clienteInfo = clientesMap[nit] || { nombre: nit };
                    if (!ventasPorCliente[nit]) {
                        ventasPorCliente[nit] = { nit, nombre: clienteInfo.nombre, facturas: 0, nc: 0, valorBruto: 0, total: 0 };
                    }
                    ventasPorCliente[nit].nc += 1;
                    let valorNC = 0;
                    (nc.items || []).forEach(item => {
                        valorNC += (item.price || 0) * (item.quantity || 1);
                    });
                    ventasPorCliente[nit].valorBruto -= valorNC;
                    ventasPorCliente[nit].total -= valorNC;
                });

                const clientesArray = Object.values(ventasPorCliente).sort((a, b) => b.total - a.total);

                // Calcular totales
                let totalFacturas = 0, totalNC = 0, totalValorFacturas = 0, totalValorNC = 0;
                facturasDelPeriodo.forEach(f => {
                    totalFacturas++;
                    (f.items || []).forEach(item => {
                        totalValorFacturas += (item.price || 0) * (item.quantity || 1);
                    });
                });
                notasCreditoDelPeriodo.forEach(nc => {
                    totalNC++;
                    (nc.items || []).forEach(item => {
                        totalValorNC += (item.price || 0) * (item.quantity || 1);
                    });
                });

                // Calcular totales anuales
                let totalVentasAnual = 0, totalNCAnual = 0;
                for (let m = 1; m <= 12; m++) {
                    totalVentasAnual += ventasMensualesAnio[m].ventas;
                    totalNCAnual += ventasMensualesAnio[m].nc;
                }

                // Crear el contenido del PDF - Ancho ajustado para formato carta (215.9mm - márgenes)
                const pdfContent = document.createElement('div');
                pdfContent.style.cssText = 'width: 720px; padding: 25px; font-family: Inter, -apple-system, sans-serif; background: white; color: #1E1E1E;';

                const fechaGeneracion = new Date().toLocaleDateString('es-CO', {
                    year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                // Calcular máximo para la gráfica
                let maxNetoMensual = 0;
                for (let m = 1; m <= 12; m++) {
                    if (ventasMensualesAnio[m].neto > maxNetoMensual) {
                        maxNetoMensual = ventasMensualesAnio[m].neto;
                    }
                }

                pdfContent.innerHTML = `
                    <!-- Header -->
                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 3px solid #418D93; margin-bottom: 20px;">
                        <img src="${LOGO_URL}" style="height: 50px;" crossorigin="anonymous">
                        <div style="text-align: right;">
                            <h1 style="font-size: 22px; font-weight: 700; color: #003839; margin: 0;">Análisis de Ventas ${anioAnalisis}</h1>
                            <p style="font-size: 11px; color: #757575; margin: 4px 0 0 0;">Generado: ${fechaGeneracion}</p>
                        </div>
                    </div>

                    <!-- Resumen Anual -->
                    <div style="margin-bottom: 20px;">
                        <h2 style="font-size: 14px; font-weight: 700; color: #003839; border-bottom: 2px solid #7BDCB5; padding-bottom: 6px; margin-bottom: 12px;">
                            Resumen Anual ${anioAnalisis}
                        </h2>
                        <div style="display: flex; gap: 12px;">
                            <div style="flex: 1; background: linear-gradient(135deg, #f0fdf4, #dcfce7); padding: 14px; border-radius: 8px; border: 1px solid #86efac;">
                                <div style="font-size: 11px; font-weight: 600; color: #166534; margin-bottom: 6px;">Ventas Brutas</div>
                                <div style="font-size: 18px; font-weight: 700; color: #166534;">${formatCurrency(totalVentasAnual)}</div>
                            </div>
                            <div style="flex: 1; background: linear-gradient(135deg, #fef2f2, #fecaca); padding: 14px; border-radius: 8px; border: 1px solid #fca5a5;">
                                <div style="font-size: 11px; font-weight: 600; color: #991b1b; margin-bottom: 6px;">Notas Crédito</div>
                                <div style="font-size: 18px; font-weight: 700; color: #991b1b;">-${formatCurrency(totalNCAnual)}</div>
                            </div>
                            <div style="flex: 1; background: linear-gradient(135deg, #eff6ff, #bfdbfe); padding: 14px; border-radius: 8px; border: 1px solid #93c5fd;">
                                <div style="font-size: 11px; font-weight: 600; color: #1e40af; margin-bottom: 6px;">Ventas Netas</div>
                                <div style="font-size: 18px; font-weight: 700; color: #1e40af;">${formatCurrency(totalVentasAnual - totalNCAnual)}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Gráfica de Barras Mensual -->
                    <div style="margin-bottom: 20px;">
                        <h2 style="font-size: 14px; font-weight: 700; color: #003839; border-bottom: 2px solid #7BDCB5; padding-bottom: 6px; margin-bottom: 12px;">
                            Ventas Netas Mensuales ${anioAnalisis}
                        </h2>
                        <div style="display: flex; align-items: flex-end; justify-content: space-between; height: 120px; padding: 10px 5px; background: #f9fafb; border-radius: 8px; border: 1px solid #e5e7eb;">
                            ${MESES.map((mes, i) => {
                                const data = ventasMensualesAnio[i + 1];
                                const altura = maxNetoMensual > 0 ? Math.max((data.neto / maxNetoMensual) * 100, 2) : 2;
                                const isSelected = (i + 1) === mesSeleccionado;
                                return `
                                    <div style="display: flex; flex-direction: column; align-items: center; flex: 1;">
                                        <div style="font-size: 7px; color: #374151; margin-bottom: 3px; font-weight: 500;">${formatCompacto(data.neto)}</div>
                                        <div style="width: 85%; height: ${altura}px; background: ${isSelected ? '#418D93' : '#7BDCB5'}; border-radius: 3px 3px 0 0;"></div>
                                        <div style="font-size: 8px; color: #6b7280; margin-top: 4px; font-weight: ${isSelected ? '700' : '400'};">${mes.substring(0, 3)}</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <!-- Ventas Mensuales Tabla -->
                    <div style="margin-bottom: 20px;">
                        <h2 style="font-size: 14px; font-weight: 700; color: #003839; border-bottom: 2px solid #7BDCB5; padding-bottom: 6px; margin-bottom: 12px;">
                            Detalle Mensual ${anioAnalisis}
                        </h2>
                        <table style="width: 100%; border-collapse: collapse; font-size: 9px;">
                            <thead>
                                <tr style="background: #003839; color: white;">
                                    <th style="padding: 6px 8px; text-align: left; border: 1px solid #003839;">Mes</th>
                                    <th style="padding: 6px 8px; text-align: right; border: 1px solid #003839;">Ventas Brutas</th>
                                    <th style="padding: 6px 8px; text-align: right; border: 1px solid #003839;">Notas Crédito</th>
                                    <th style="padding: 6px 8px; text-align: right; border: 1px solid #003839;">Ventas Netas</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${MESES.map((mes, i) => {
                                    const data = ventasMensualesAnio[i + 1];
                                    const isSelected = (i + 1) === mesSeleccionado;
                                    return `
                                        <tr style="background: ${isSelected ? '#e0f2fe' : (i % 2 === 0 ? '#f9f9f9' : 'white')};">
                                            <td style="padding: 5px 8px; border: 1px solid #e5e7eb; font-weight: ${isSelected ? '700' : '400'};">${mes}</td>
                                            <td style="padding: 5px 8px; border: 1px solid #e5e7eb; text-align: right;">${formatCurrency(data.ventas)}</td>
                                            <td style="padding: 5px 8px; border: 1px solid #e5e7eb; text-align: right; color: #991b1b;">${data.nc > 0 ? '-' + formatCurrency(data.nc) : '$0'}</td>
                                            <td style="padding: 5px 8px; border: 1px solid #e5e7eb; text-align: right; font-weight: 600; color: #166534;">${formatCurrency(data.neto)}</td>
                                        </tr>
                                    `;
                                }).join('')}
                                <tr style="background: #003839; color: white; font-weight: 700;">
                                    <td style="padding: 6px 8px; border: 1px solid #003839;">TOTAL</td>
                                    <td style="padding: 6px 8px; border: 1px solid #003839; text-align: right;">${formatCurrency(totalVentasAnual)}</td>
                                    <td style="padding: 6px 8px; border: 1px solid #003839; text-align: right;">-${formatCurrency(totalNCAnual)}</td>
                                    <td style="padding: 6px 8px; border: 1px solid #003839; text-align: right;">${formatCurrency(totalVentasAnual - totalNCAnual)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Page Break -->
                    <div style="page-break-before: always;"></div>

                    <!-- Header Página 2 - Logo más pequeño -->
                    <div style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #418D93; margin-bottom: 15px;">
                        <img src="${LOGO_URL}" style="height: 28px;" crossorigin="anonymous">
                        <div style="text-align: right;">
                            <span style="font-size: 12px; font-weight: 600; color: #003839;">Detalle del Período: ${periodoLabel}</span>
                        </div>
                    </div>

                    <!-- Resumen del Período -->
                    <div style="margin-bottom: 18px;">
                        <h2 style="font-size: 14px; font-weight: 700; color: #003839; border-bottom: 2px solid #7BDCB5; padding-bottom: 6px; margin-bottom: 12px;">
                            Resumen: ${periodoLabel}
                        </h2>
                        <div style="display: flex; gap: 12px;">
                            <div style="flex: 1; background: #f0fdf4; padding: 12px; border-radius: 8px; border: 1px solid #86efac;">
                                <div style="font-size: 10px; color: #166534; margin-bottom: 6px;">Facturas Emitidas</div>
                                <div style="font-size: 18px; font-weight: 700; color: #166534;">${totalFacturas}</div>
                                <div style="font-size: 12px; color: #15803d; margin-top: 3px;">${formatCurrency(totalValorFacturas)}</div>
                            </div>
                            <div style="flex: 1; background: #fef2f2; padding: 12px; border-radius: 8px; border: 1px solid #fca5a5;">
                                <div style="font-size: 10px; color: #991b1b; margin-bottom: 6px;">Notas Crédito</div>
                                <div style="font-size: 18px; font-weight: 700; color: #991b1b;">${totalNC}</div>
                                <div style="font-size: 12px; color: #b91c1c; margin-top: 3px;">-${formatCurrency(totalValorNC)}</div>
                            </div>
                            <div style="flex: 1; background: #eff6ff; padding: 12px; border-radius: 8px; border: 1px solid #93c5fd;">
                                <div style="font-size: 10px; color: #1e40af; margin-bottom: 6px;">Ventas Netas</div>
                                <div style="font-size: 18px; font-weight: 700; color: #1e40af;">${totalFacturas - totalNC}</div>
                                <div style="font-size: 12px; color: #1d4ed8; margin-top: 3px;">${formatCurrency(totalValorFacturas - totalValorNC)}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Tabla de Clientes -->
                    <div style="margin-bottom: 20px;">
                        <h2 style="font-size: 14px; font-weight: 700; color: #003839; border-bottom: 2px solid #7BDCB5; padding-bottom: 6px; margin-bottom: 12px;">
                            Ventas Netas por Cliente - ${periodoLabel}
                        </h2>
                        <table style="width: 100%; border-collapse: collapse; font-size: 9px;">
                            <thead>
                                <tr style="background: #003839; color: white;">
                                    <th style="padding: 6px; text-align: left; border: 1px solid #003839;">NIT</th>
                                    <th style="padding: 6px; text-align: left; border: 1px solid #003839;">Cliente</th>
                                    <th style="padding: 6px; text-align: center; border: 1px solid #003839;">Fact.</th>
                                    <th style="padding: 6px; text-align: center; border: 1px solid #003839;">NC</th>
                                    <th style="padding: 6px; text-align: right; border: 1px solid #003839;">Valor Neto</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${clientesArray.slice(0, 20).map((c, i) => `
                                    <tr style="background: ${i % 2 === 0 ? '#f9f9f9' : 'white'};">
                                        <td style="padding: 4px 6px; border: 1px solid #e5e7eb; font-family: monospace; font-size: 8px;">${c.nit}</td>
                                        <td style="padding: 4px 6px; border: 1px solid #e5e7eb;">${c.nombre.substring(0, 35)}${c.nombre.length > 35 ? '...' : ''}</td>
                                        <td style="padding: 4px 6px; border: 1px solid #e5e7eb; text-align: center; color: #166534;">${c.facturas}</td>
                                        <td style="padding: 4px 6px; border: 1px solid #e5e7eb; text-align: center; color: ${c.nc > 0 ? '#991b1b' : '#9ca3af'};">${c.nc > 0 ? '-' + c.nc : '0'}</td>
                                        <td style="padding: 4px 6px; border: 1px solid #e5e7eb; text-align: right; font-weight: 600;">${formatCurrency(c.total)}</td>
                                    </tr>
                                `).join('')}
                                ${clientesArray.length > 20 ? `
                                    <tr style="background: #f5f5f5;">
                                        <td colspan="5" style="padding: 6px; border: 1px solid #e5e7eb; text-align: center; font-style: italic; color: #757575;">
                                            ... y ${clientesArray.length - 20} clientes más
                                        </td>
                                    </tr>
                                ` : ''}
                                <tr style="background: #003839; color: white; font-weight: 700;">
                                    <td colspan="2" style="padding: 6px; border: 1px solid #003839;">TOTAL</td>
                                    <td style="padding: 6px; border: 1px solid #003839; text-align: center;">${totalFacturas}</td>
                                    <td style="padding: 6px; border: 1px solid #003839; text-align: center;">${totalNC > 0 ? '-' + totalNC : '0'}</td>
                                    <td style="padding: 6px; border: 1px solid #003839; text-align: right;">${formatCurrency(totalValorFacturas - totalValorNC)}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Footer con Powered by Métrik -->
                    <div style="margin-top: 30px; padding-top: 15px; border-top: 1px solid #ddd;">
                        <div style="text-align: center; font-size: 9px; color: #757575; margin-bottom: 12px;">
                            <p style="margin: 0;">Lexia Abogados S.A.S. | Dashboard de Facturación</p>
                            <p style="margin: 3px 0 0 0;">Documento generado el ${fechaGeneracion}</p>
                        </div>
                        <div style="display: flex; justify-content: center; align-items: center; gap: 6px; margin-top: 10px;">
                            <span style="font-size: 9px; color: #9ca3af;">Powered by</span>
                            <img src="https://i.ibb.co/sdb3Bpq5/M-trik-logo-iso.png" style="height: 22px;" crossorigin="anonymous">
                        </div>
                    </div>
                `;

                document.body.appendChild(pdfContent);

                // Configuración de html2pdf
                const opt = {
                    margin: [10, 10, 10, 10],
                    filename: `Lexia_Analisis_${anioAnalisis}_${periodoLabel.replace(' ', '_')}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        letterRendering: true
                    },
                    jsPDF: {
                        unit: 'mm',
                        format: 'letter',
                        orientation: 'portrait'
                    },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                };

                await html2pdf().set(opt).from(pdfContent).save();

                document.body.removeChild(pdfContent);

            } catch (error) {
                console.error('Error al generar PDF:', error);
                alert('Error al generar el PDF. Por favor intenta de nuevo.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="12" y1="18" x2="12" y2="12"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                    </svg>
                    Exportar PDF
                `;
            }
        }
    </script>
</body>
</html>
