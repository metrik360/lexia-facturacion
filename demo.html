<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MéTRIK — Dashboard Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --negro-carbon: #1A1A1A;
            --gris-acero: #6B7280;
            --verde-metrica: #10B981;
            --verde-metrica-dark: #059669;
            --rojo-alerta: #EF4444;
            --amarillo-warning: #F59E0B;
            --blanco: #FFFFFF;
            --gris-linea: #E5E7EB;
            --fondo: #F9FAFB;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--fondo);
            color: var(--negro-carbon);
            line-height: 1.5;
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: var(--negro-carbon);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--blanco);
            letter-spacing: 1px;
        }

        .header-logo .accent {
            text-transform: lowercase;
        }

        .logo-line {
            display: block;
            height: 2px;
            background: var(--verde-metrica);
            margin-top: 2px;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--gris-acero);
            font-weight: 500;
        }

        .header-date {
            font-size: 11px;
            color: var(--gris-acero);
            text-align: right;
            font-weight: 500;
        }

        /* Content */
        .content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Section */
        .section {
            background: var(--blanco);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--gris-linea);
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }

        /* KPI Cards */
        .kpi-main {
            text-align: center;
            padding: 24px 16px;
            background: linear-gradient(135deg, var(--negro-carbon) 0%, #2D2D2D 100%);
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .kpi-main-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-main-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--verde-metrica);
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .kpi-main-period {
            font-size: 13px;
            color: var(--gris-acero);
            font-weight: 500;
        }

        .kpi-status {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .kpi-status.positive {
            background: rgba(16, 185, 129, 0.15);
            color: var(--verde-metrica);
        }

        .kpi-status.negative {
            background: rgba(239, 68, 68, 0.15);
            color: var(--rojo-alerta);
        }

        .kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .kpi-card {
            background: var(--fondo);
            border-radius: 10px;
            padding: 16px;
            border: 1px solid var(--gris-linea);
        }

        .kpi-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
        }

        .kpi-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--negro-carbon);
            line-height: 1.2;
        }

        .kpi-subtitle {
            font-size: 11px;
            color: var(--gris-acero);
            margin-top: 4px;
            font-weight: 500;
        }

        /* Cartera / Aging */
        .aging-bar {
            display: flex;
            height: 32px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .aging-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: var(--blanco);
            min-width: 20px;
            transition: width 0.5s ease;
        }

        .aging-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .aging-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .aging-item-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .aging-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .aging-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--negro-carbon);
        }

        .aging-value {
            font-size: 13px;
            font-weight: 700;
            color: var(--negro-carbon);
            font-variant-numeric: tabular-nums;
        }

        /* Chart */
        .chart-container {
            position: relative;
        }

        .chart-months {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }

        .chart-month {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            height: 120px;
        }

        .chart-bar {
            flex: 1;
            border-radius: 3px 3px 0 0;
            min-width: 6px;
            transition: height 0.5s ease;
        }

        .chart-bar.year-current {
            background: var(--verde-metrica);
        }

        .chart-bar.year-prev {
            background: var(--gris-linea);
        }

        .chart-month-label {
            font-size: 9px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
        }

        .chart-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }

        .chart-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gris-acero);
        }

        .chart-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* CTA */
        .cta-section {
            background: var(--negro-carbon);
            border-radius: 12px;
            padding: 28px 20px;
            text-align: center;
        }

        .cta-tagline {
            font-size: 18px;
            font-weight: 700;
            color: var(--blanco);
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .cta-subtitle {
            font-size: 13px;
            color: var(--gris-acero);
            margin-bottom: 20px;
            font-weight: 500;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--verde-metrica);
            color: var(--blanco);
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            transition: background 0.2s;
        }

        .cta-button:hover {
            background: var(--verde-metrica-dark);
        }

        .cta-logo {
            margin-top: 20px;
        }

        .cta-logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: var(--blanco);
            letter-spacing: 1px;
        }

        .cta-logo-line {
            display: block;
            width: 62px;
            height: 2px;
            background: var(--verde-metrica);
            margin: 3px auto 0;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 20px;
            padding: 40px 20px;
        }

        .loading-source {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .loading-icon {
            width: 64px;
            height: 64px;
            background: var(--negro-carbon);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .loading-icon svg {
            width: 32px;
            height: 32px;
            color: var(--verde-metrica);
        }

        .loading-icon-pulse {
            position: absolute;
            inset: -4px;
            border-radius: 20px;
            border: 2px solid var(--verde-metrica);
            animation: pulse-ring 1.5s ease-out infinite;
        }

        @keyframes pulse-ring {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.3); }
        }

        .loading-source-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .loading-source-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--negro-carbon);
            letter-spacing: 1px;
        }

        .loading-source-desc {
            font-size: 13px;
            color: var(--gris-acero);
            text-align: center;
            line-height: 1.5;
            max-width: 280px;
        }

        .loading-connector {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            background: var(--blanco);
            border: 1px solid var(--gris-linea);
            border-radius: 10px;
        }

        .loading-connector-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--verde-metrica);
            animation: blink 1s ease-in-out infinite;
        }

        .loading-connector-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-connector-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .loading-step {
            font-size: 14px;
            font-weight: 600;
            color: var(--negro-carbon);
        }

        .loading-step-detail {
            font-size: 12px;
            color: var(--gris-acero);
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gris-linea);
            border-top-color: var(--verde-metrica);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: var(--gris-acero);
            font-weight: 500;
        }

        .progress-bar {
            width: 260px;
            height: 6px;
            background: var(--gris-linea);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--verde-metrica);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 40px 20px;
        }

        .error-container h3 {
            color: var(--rojo-alerta);
            margin-bottom: 8px;
        }

        .error-container p {
            color: var(--gris-acero);
            font-size: 14px;
        }

        /* PyG */
        .pyg-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .pyg-resultado {
            text-align: right;
        }

        .pyg-resultado-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
        }

        .pyg-resultado-value {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
        }

        .pyg-resultado-margin {
            font-size: 12px;
            font-weight: 600;
        }

        .pyg-bar-dual {
            position: relative;
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
            background: var(--verde-metrica);
        }

        .pyg-bar-gastos {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--rojo-alerta);
            border-radius: 6px 0 0 6px;
            transition: width 0.5s ease;
        }

        .pyg-bar-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .pyg-bar-label {
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pyg-bar-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .pyg-lines {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .pyg-line {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid var(--gris-linea);
        }

        .pyg-line:last-child {
            border-bottom: none;
        }

        .pyg-line-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--negro-carbon);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pyg-line-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .pyg-line-value {
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .pyg-line.ingreso .pyg-line-value {
            color: var(--verde-metrica);
        }

        .pyg-line.gasto .pyg-line-value {
            color: var(--rojo-alerta);
        }

        .pyg-line.gasto .pyg-line-label {
            color: var(--gris-acero);
        }

        .pyg-divider {
            height: 2px;
            background: var(--negro-carbon);
            margin: 4px 0;
        }

        .pyg-line.total {
            padding: 14px 0 8px;
            border-bottom: none;
        }

        .pyg-line.total .pyg-line-label {
            font-weight: 700;
            font-size: 14px;
        }

        .pyg-line.total .pyg-line-value {
            font-size: 18px;
        }

        .pyg-disponible {
            background: linear-gradient(135deg, var(--negro-carbon) 0%, #2D2D2D 100%);
            border-radius: 10px;
            padding: 16px;
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pyg-disponible-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .pyg-disponible-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gris-acero);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pyg-disponible-sub {
            font-size: 10px;
            color: var(--gris-acero);
        }

        .pyg-disponible-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--verde-metrica);
        }

        /* Comparison indicator */
        .comparison {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
        }

        .comparison.up {
            color: var(--verde-metrica);
            background: rgba(16, 185, 129, 0.1);
        }

        .comparison.down {
            color: var(--rojo-alerta);
            background: rgba(239, 68, 68, 0.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-brand">
            <div>
                <div class="header-logo">M<span class="accent">é</span>TRIK</div>
                <div class="logo-line"></div>
            </div>
        </div>
        <div class="header-date" id="headerDate"></div>
    </div>

    <!-- Main Content -->
    <div class="content" id="mainContent">
        <div class="loading">
            <div class="loading-source">
                <div class="loading-icon">
                    <div class="loading-icon-pulse"></div>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                        <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                    </svg>
                </div>
                <div class="loading-source-label">Conectando con</div>
                <div class="loading-source-name">SIIGO</div>
                <div class="loading-source-desc">Extrayendo datos en tiempo real desde tu software contable</div>
            </div>

            <div class="loading-connector">
                <div class="loading-connector-dot"></div>
                <div class="loading-connector-dot"></div>
                <div class="loading-connector-dot"></div>
            </div>

            <div>
                <div class="loading-step" id="loadingText">Conectando...</div>
                <div class="loading-step-detail" id="loadingDetail">Preparando conexion segura</div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIG
        // ============================================
        const CONFIG = {
            USERNAME: 'facturacion@lexia.co',
            ACCESS_KEY: 'NmYyMDc3YjgtNzBhMS00OTM1LWI4ZGUtYzFmMzkyYzAwNjExOnJ+ZDFRMWtDN1E='
        };

        // Detect environment
        const isLocalNodeServer = window.location.hostname === 'localhost' && window.location.port === '3001';
        const isVercelDev = window.location.hostname === 'localhost' && window.location.port === '3000';
        const isVercel = isVercelDev || (!isLocalNodeServer && window.location.protocol === 'https:');
        const isLocalServer = isLocalNodeServer;
        const BASE_PATH = window.location.pathname.includes('/lexia') ? '/lexia' : '';

        // ============================================
        // ANONYMIZATION MAP
        // ============================================
        const ANON_NAMES = [
            'Grupo Andino S.A.S.', 'Inversiones del Caribe', 'TechCorp Colombia',
            'Soluciones Globales', 'Construir S.A.', 'Logistica Express',
            'Distribuidora Central', 'Manufactura Premium', 'Servicios Integrados',
            'Comercial del Norte', 'Alianza Industrial', 'Grupo Pacifico',
            'Transporte Nacional', 'Minera del Sur', 'Agro Exportadora',
            'Energia Renovable S.A.', 'Textiles del Valle', 'Quimica Industrial',
            'Alimentos del Campo', 'Metalurgica Andina'
        ];
        const anonMap = {};
        let anonCounter = 0;

        function anonimizar(nombre) {
            if (!nombre || nombre === 'N/A') return 'Cliente';
            if (!anonMap[nombre]) {
                anonMap[nombre] = ANON_NAMES[anonCounter % ANON_NAMES.length];
                anonCounter++;
            }
            return anonMap[nombre];
        }

        // Cost centers (generic names)
        const LINEAS_NEGOCIO = {
            158: 'Area 1', 159: 'Area 2', 162: 'Area 3', 164: 'Area 4',
            166: 'Area 5', 168: 'Area 6', 170: 'Area 7', 171: 'Area 8',
            173: 'Area 9', 175: 'Area 10', 1511: 'Area 11', 1626: 'Area 12',
            1627: 'Area 4', 1629: 'Area 3', 1630: 'Area 13', 1631: 'Area 14',
            1632: 'Area 5', 1633: 'Area 6', 1636: 'Area 9'
        };

        // ============================================
        // STATE
        // ============================================
        let accessToken = null;
        let facturas = [];
        let notasCredito = [];
        let vouchers = [];
        let pagosPorFactura = {};
        let facturasProcessed = [];
        let clientesMap = {};

        const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
        const MESES_CORTOS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

        // ============================================
        // UTILITIES
        // ============================================
        function formatCurrency(value) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency', currency: 'COP',
                minimumFractionDigits: 0, maximumFractionDigits: 0
            }).format(value);
        }

        function formatCompacto(valor) {
            if (valor === 0) return '';
            if (valor >= 1000000000) return '$' + (valor / 1000000000).toFixed(1) + 'B';
            if (valor >= 1000000) return '$' + (valor / 1000000).toFixed(0) + 'M';
            if (valor >= 1000) return '$' + (valor / 1000).toFixed(0) + 'K';
            return '$' + Math.round(valor);
        }

        function formatMillones(valor) {
            if (valor >= 1000000000) return '$' + Math.round(valor / 1000000000) + 'B';
            if (valor >= 1000000) return '$' + Math.round(valor / 1000000) + 'M';
            if (valor >= 1000) return '$' + Math.round(valor / 1000) + 'K';
            return '$' + Math.round(valor);
        }

        function calcularDias(fechaFactura) {
            const hoy = new Date();
            const fecha = new Date(fechaFactura);
            return Math.floor((hoy - fecha) / (1000 * 60 * 60 * 24));
        }

        function calcularHorizonte(dias) {
            if (dias <= 30) return { rango: '0-30', label: '0-30 dias' };
            if (dias <= 60) return { rango: '31-60', label: '31-60 dias' };
            if (dias <= 90) return { rango: '61-90', label: '61-90 dias' };
            if (dias <= 120) return { rango: '91-120', label: '91-120 dias' };
            return { rango: '>120', label: '> 120 dias' };
        }

        function convertirACOP(valor, currency) {
            if (!currency || !currency.code || currency.code === 'COP') return valor;
            return valor * (currency.exchange_rate || 1);
        }

        function updateProgress(percent, text, detail) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('loadingText').textContent = text;
            const detailEl = document.getElementById('loadingDetail');
            if (detailEl && detail) detailEl.textContent = detail;
        }

        // ============================================
        // API
        // ============================================
        async function autenticar() {
            updateProgress(10, 'Autenticando con SIIGO', 'Conexion segura al software contable');
            if (isLocalServer) {
                const response = await fetch('/auth');
                if (!response.ok) throw new Error('Error de autenticacion');
                const data = await response.json();
                accessToken = data.access_token;
            } else if (isVercel) {
                const response = await fetch(`${BASE_PATH}/api/siigo?endpoint=auth&username=${encodeURIComponent(CONFIG.USERNAME)}&access_key=${encodeURIComponent(CONFIG.ACCESS_KEY)}`);
                if (!response.ok) throw new Error('Error de autenticacion');
                const data = await response.json();
                accessToken = data.access_token;
            }
        }

        async function fetchPaginated(endpoint, pageSize = 100) {
            let allResults = [];
            let page = 1;
            let hasMore = true;
            const cleanEndpoint = endpoint.replace('/v1/', '');

            while (hasMore) {
                let url;
                let headers = { 'Content-Type': 'application/json' };

                if (isLocalServer) {
                    url = `${BASE_PATH}/api/${cleanEndpoint}?page=${page}&page_size=${pageSize}`;
                } else if (isVercel) {
                    url = `${BASE_PATH}/api/siigo?endpoint=${encodeURIComponent(cleanEndpoint)}&page=${page}&page_size=${pageSize}`;
                    headers['Authorization'] = `Bearer ${accessToken}`;
                }

                const response = await fetch(url, { headers });
                if (!response.ok) throw new Error(`Error fetching ${endpoint}`);
                const data = await response.json();
                allResults = allResults.concat(data.results || []);
                const total = data.pagination?.total_results || 0;
                hasMore = allResults.length < total;
                page++;
            }
            return allResults;
        }

        // ============================================
        // DATA PROCESSING
        // ============================================
        const UMBRAL_USD_SOSPECHOSO = 100000;

        function procesarDatos() {
            return facturas
                .filter(f => {
                    if (f.balance <= 0) return false;
                    const currency = f.currency || null;
                    const esMonedaExtranjera = currency && currency.code && currency.code !== 'COP';
                    if (esMonedaExtranjera && f.total > UMBRAL_USD_SOSPECHOSO) return false;
                    return true;
                })
                .map(f => {
                    const dias = calcularDias(f.date);
                    const horizonte = calcularHorizonte(dias);
                    const clienteNit = f.customer?.identification || 'N/A';
                    const clienteInfo = clientesMap[clienteNit] || { nit: clienteNit, nombre: clienteNit };
                    const currency = f.currency || null;
                    const esMonedaExtranjera = currency && currency.code && currency.code !== 'COP';

                    let valorBase = (f.items || []).reduce((sum, item) => sum + ((item.quantity || 0) * (item.price || 0)), 0);
                    valorBase = convertirACOP(valorBase, currency);
                    const totalNeto = convertirACOP(f.total || 0, currency);
                    const balanceOriginal = f.balance || 0;
                    const totalParaComparar = esMonedaExtranjera ? totalNeto : f.total || 0;
                    const balance = balanceOriginal > totalParaComparar ? totalParaComparar : balanceOriginal;

                    return {
                        numero: `${f.prefix}-${f.number}`,
                        fecha: f.date,
                        clienteNit,
                        clienteNombre: anonimizar(clienteInfo.nombre),
                        lineaNegocio: LINEAS_NEGOCIO[f.cost_center] || 'Sin asignar',
                        total: valorBase,
                        totalNeto,
                        balance,
                        dias,
                        horizonte: horizonte.rango,
                        esProblematica: dias > 60,
                        monedaOriginal: esMonedaExtranjera ? currency.code : 'COP',
                        tasaCambio: esMonedaExtranjera ? currency.exchange_rate : 1
                    };
                });
        }

        function calcularVentasMensuales() {
            const anioActual = new Date().getFullYear();
            const anios = [anioActual - 1, anioActual];
            const meses = Array.from({length: 12}, (_, i) => i + 1);

            const ventasPorMesAnio = {};
            anios.forEach(anio => {
                ventasPorMesAnio[anio] = {};
                meses.forEach(mes => {
                    ventasPorMesAnio[anio][mes] = { ventas: 0, nc: 0, neto: 0 };
                });
            });

            facturas.forEach(f => {
                if (!f.date) return;
                const anio = parseInt(f.date.substring(0, 4));
                const mes = parseInt(f.date.substring(5, 7));
                if (!anios.includes(anio) || !ventasPorMesAnio[anio]) return;

                const fCurrency = f.currency || null;
                let totalFactura = (f.items || []).reduce((sum, item) => sum + ((item.quantity || 0) * (item.price || 0)), 0);
                totalFactura = convertirACOP(totalFactura, fCurrency);
                ventasPorMesAnio[anio][mes].ventas += totalFactura;
            });

            notasCredito.forEach(nc => {
                if (!nc.date) return;
                const anio = parseInt(nc.date.substring(0, 4));
                const mes = parseInt(nc.date.substring(5, 7));
                if (!anios.includes(anio) || !ventasPorMesAnio[anio]) return;

                const ncCurrency = nc.currency || null;
                let totalNC = (nc.items || []).reduce((sum, item) => sum + ((item.quantity || 0) * (item.price || 0)), 0);
                totalNC = convertirACOP(totalNC, ncCurrency);
                ventasPorMesAnio[anio][mes].nc += totalNC;
            });

            anios.forEach(anio => {
                meses.forEach(mes => {
                    ventasPorMesAnio[anio][mes].neto = ventasPorMesAnio[anio][mes].ventas - ventasPorMesAnio[anio][mes].nc;
                });
            });

            return ventasPorMesAnio;
        }

        function calcularKPIs(processed) {
            const carteraPendiente = processed.reduce((sum, f) => sum + f.balance, 0);
            const clientesUnicos = new Set(processed.map(f => f.clienteNit)).size;

            const carteraPorHorizonte = { '0-30': 0, '31-60': 0, '61-90': 0, '91-120': 0, '>120': 0 };
            processed.forEach(f => {
                carteraPorHorizonte[f.horizonte] += f.balance;
            });

            const topClientes = {};
            processed.forEach(f => {
                if (!topClientes[f.clienteNit]) {
                    topClientes[f.clienteNit] = { nombre: f.clienteNombre, total: 0 };
                }
                topClientes[f.clienteNit].total += f.balance;
            });
            const top5 = Object.values(topClientes).sort((a, b) => b.total - a.total).slice(0, 5);

            return { carteraPendiente, clientesUnicos, totalFacturas: processed.length, carteraPorHorizonte, top5 };
        }

        function renderError(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="error-container">
                    <h3>Error</h3>
                    <p>${message}</p>
                </div>
            `;
        }

        // ============================================
        // MAIN
        // ============================================
        async function cargarDatos() {
            try {
                await autenticar();

                updateProgress(20, 'Descargando clientes', 'Leyendo base de clientes desde SIIGO');
                const clientesData = await fetchPaginated('/v1/customers', 100);
                clientesData.forEach(c => {
                    const nit = c.identification;
                    const nombre = Array.isArray(c.name) ? c.name.join(' ') : c.name;
                    clientesMap[nit] = { nit, nombre: nombre || nit };
                });

                updateProgress(45, 'Descargando facturas', 'Extrayendo historial de facturacion de SIIGO');
                facturas = await fetchPaginated('/v1/invoices', 100);

                updateProgress(75, 'Descargando notas credito', 'Cruzando notas credito con facturas');
                notasCredito = await fetchPaginated('/v1/credit-notes', 100);

                updateProgress(90, 'Procesando datos', 'Calculando KPIs y cartera en tiempo real');
                facturasProcessed = procesarDatos();

                const kpis = calcularKPIs(facturasProcessed);
                const ventasPorMesAnio = calcularVentasMensuales();

                updateProgress(100, 'Datos listos', 'Dashboard actualizado con datos de SIIGO');
                setTimeout(() => renderDashboard(kpis, ventasPorMesAnio), 200);

            } catch (error) {
                console.error('Error:', error);
                renderError('Error al cargar datos. Intenta de nuevo.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
        });
    </script>
